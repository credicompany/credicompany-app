<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
}

/* HEADER LIMPIO Y CENTRADO */
.header{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px 10px;
text-align:center;
}

.header img{
width:120px;
margin-bottom:8px;
}

.header h2{
margin:0;
font-size:22px;
}

.header p{
margin:2px 0 0 0;
font-size:14px;
opacity:0.9;
}

/* TARJETAS */
.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#10c251;
color:white;
font-weight:bold;
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:15px;
cursor:pointer;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
}
</style>
</head>

<body>

<!-- ✅ ÚNICO HEADER -->
<div class="header">
<img src="logo.png">
<h2>Credicompany</h2>
<p>Crecemos juntos.</p>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button id="btnLogin">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="simulador" class="card">

<h3>Simulador</h3>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<button onclick="enviarPago()">📲 Enviar simulación</button>

</div>

<div id="pagos" class="card" style="display:none">

<h3>💳 Medios de Pago</h3>

<h4>Cuenta Recaudadora</h4>
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg" onclick="enviarQR('PRINCIPAL')">

<h4>BBVA</h4>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg" onclick="enviarQR('BBVA')">

<h4>BCP</h4>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg" onclick="enviarQR('BCP')">

<h4>Yape</h4>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg" onclick="enviarQR('Yape')">

</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

// LOGIN
document.addEventListener("DOMContentLoaded", function(){

document.getElementById("btnLogin").addEventListener("click", function(){

let user = document.getElementById("usuario").value.trim();
let pass = document.getElementById("clave").value.trim();

if(!user || !pass){
alert("Completa todos los campos");
return;
}

if(user === "admin" && pass === "1234"){
document.getElementById("loginDiv").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Usuario o clave incorrectos");
}

});

});

// NAVEGACIÓN
function mostrar(p){
document.getElementById("simulador").style.display="none";
document.getElementById("pagos").style.display="none";
document.getElementById(p).style.display="block";
}

// SIMULADOR
let ultimaSimulacion={};

function calcular(){

let m=parseFloat(document.getElementById("monto").value);
let t=parseFloat(document.getElementById("tasa").value)/100;
let n=parseInt(document.getElementById("plazo").value);

if(!m || !t || !n){
alert("Completa todos los datos");
return;
}

let i = Math.pow(1+t,1/4)-1;

let cuota = m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

document.getElementById("resultado").innerHTML = `
Interés correcto aplicado ✔<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

ultimaSimulacion = {monto:m,cuota:cuota};
}

// WHATSAPP SIMULACIÓN
function enviarPago(){

if(!ultimaSimulacion.monto){
alert("Primero calcula la simulación");
return;
}

let msg = `💳 Credicompany

Monto: S/ ${ultimaSimulacion.monto}
Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}

Seleccione medio de pago`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// QR
function enviarQR(tipo){

let linkQR="";

if(tipo=="PRINCIPAL"){
linkQR="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg";
}

if(tipo=="BBVA"){
linkQR="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg";
}

if(tipo=="BCP"){
linkQR="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg";
}

if(tipo=="Yape"){
linkQR="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg";
}

let mensaje = `💳 Credicompany

Pago vía ${tipo}

Escanea aquí:
${linkQR}

Enviar comprobante luego del pago`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));

}

</script>

</body>
</html>
