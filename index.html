<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">

<title>Credicompany</title>

<style>

body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:120px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

.volver{
position:sticky;
top:0;
background:#0a2f5c;
color:white;
padding:14px;
border-radius:12px;
text-align:center;
font-weight:bold;
margin-bottom:15px;
cursor:pointer;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:25px;
border-radius:15px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

/* PAGOS */
.pagos-container{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.pago-box{
background:white;
padding:15px;
border-radius:12px;
width:100%;
max-width:320px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.pago-box img{
width:100%;
height:220px;
object-fit:contain;
border-radius:10px;
background:white;
}

.pago-titulo{
font-weight:bold;
margin-bottom:10px;
color:#123B63;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal" selected>Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>Cartera de Clientes</h3>

<input id="c_nombre" placeholder="Nombre">
<input id="c_apellidos" placeholder="Apellidos">
<input id="c_dni" placeholder="DNI">
<input id="c_monto" placeholder="Monto">

<select id="c_producto">
<option>Diario</option>
<option>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="c_fecha" type="date">

<button class="btn-verde" onclick="guardarCliente()">Guardar Cliente</button>

<div id="listaClientes"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>💳 Medios de Pago</h3>

<div class="pagos-container">

<div class="pago-box">
<div class="pago-titulo">QR BBVA</div>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg">
</div>

<div class="pago-box">
<div class="pago-titulo">BCP</div>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg">
</div>

<div class="pago-box">
<div class="pago-titulo">YAPE</div>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg">
</div>

<div class="pago-box">
<div class="pago-titulo">TRANSFERENCIAS</div>
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg">
</div>

</div>

</div>

</div>

<script>

let asesor="";

function login(){
if(usuario.value==="admin" && clave.value==="1234"){
asesor=usuario.value;
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario incorrecto");
}
}

function mostrar(p){
dashboard.style.display="none";
app.style.display="block";

simulador.style.display="none";
clientes.style.display="none";
pagos.style.display="none";

document.getElementById(p).style.display="block";

if(p==="clientes") renderClientes();
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

function calcular(){

let P=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);
let tipo=producto.value;

if(!cliente.value || !apellidos.value || !dni.value){
alert("Completa datos del cliente");
return;
}

if(dni.value.length !== 8){
alert("DNI debe tener 8 dígitos");
return;
}

if(isNaN(P)||P<=0){
alert("Monto inválido");
return;
}

if(isNaN(t)||t<=0){
alert("Tasa inválida");
return;
}

if(isNaN(n)||n<=0){
alert("Cuotas inválidas");
return;
}

let i=0;

if(tipo==="diario") i=t/30;
if(tipo==="semanal") i=t/4;
if(tipo==="quincenal") i=t/2;
if(tipo==="mensual") i=t;

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);
}

function guardarCliente(){
let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

let existe=data.find(x=>x.dni===c_dni.value);

if(existe){
alert("Cliente ya existe");
return;
}

data.push({
nombre:c_nombre.value,
apellidos:c_apellidos.value,
dni:c_dni.value,
monto:c_monto.value,
fecha:new Date().toISOString()
});

localStorage.setItem("cartera_"+asesor,JSON.stringify(data));
renderClientes();
}

function renderClientes(){
let lista=document.getElementById("listaClientes");
let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

lista.innerHTML="";

data.forEach(c=>{
lista.innerHTML+=`
<div class="item">
<b>${c.nombre} ${c.apellidos}</b><br>
DNI: ${c.dni}<br>
Monto: S/ ${c.monto}
</div>`;
});
}

</script>

</body>
</html>
