<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">

<title>Credicompany</title>

<style>

body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:120px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

.volver{
position:sticky;
top:0;
background:#0a2f5c;
color:white;
padding:14px;
border-radius:12px;
text-align:center;
font-weight:bold;
margin-bottom:15px;
cursor:pointer;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:25px;
border-radius:15px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

/* PAGOS */
.pagos-container{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.pago-box{
background:white;
padding:15px;
border-radius:12px;
width:100%;
max-width:320px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
cursor:pointer;
}

.pago-box img{
width:100%;
height:auto;
max-height:320px;
object-fit:contain;
border-radius:10px;
}

.pago-titulo{
font-weight:bold;
margin-bottom:10px;
color:#123B63;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal" selected>Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar simulación</button>
<button class="btn-azul" onclick="filtrar()">📤 Enviar Filtro</button>
</div>

<h3>Control de pagos</h3>
<input id="pago" placeholder="Monto pagado">
<button class="btn-naranja" onclick="registrarPago()">💰 Registrar pago</button>
<div id="estadoPago"></div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>Cartera de Clientes</h3>

<input id="c_nombre" placeholder="Nombre">
<input id="c_apellidos" placeholder="Apellidos">
<input id="c_dni" placeholder="DNI">
<input id="c_monto" placeholder="Monto">

<select id="c_producto">
<option>Diario</option>
<option>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="c_fecha" type="date">

<button class="btn-verde" onclick="guardarCliente()">Guardar Cliente</button>

<div id="listaClientes"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>💳 Medios de Pago</h3>

<div class="pagos-container">

<div class=('BCP','https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg')">
<div class="pago-titulo">BCP</div>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg">
</div>

<div class="pago-box" onclick="enviarQR('BBVA','https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg')">
<div class="pago-titulo">BBVA</div>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg">
</div>

<div class="pago-box" onclick="enviarQR('QR YAPE','https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg')">
<div class="pago-titulo"> QR YAPE</div>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg">
</div>

<div class="pago-box" onclick="enviarQR('QR BBVA','https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg')">
<div class="pago-titulo">BBVA</div>
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg">
</div>

</div>

</div>

</div>

<script>

let asesor="";

function login(){
if(usuario.value==="admin" && clave.value==="1234"){
asesor=usuario.value;
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario incorrecto");
}
}

function mostrar(p){
dashboard.style.display="none";
app.style.display="block";

simulador.style.display="none";
clientes.style.display="none";
pagos.style.display="none";

document.getElementById(p).style.display="block";

if(p==="clientes") renderClientes();
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

function calcular(){
let P=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

if(isNaN(P)||isNaN(t)||isNaN(n)){
alert("Completa datos");
return;
}

let i=t/4;
let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);

window.sim={
nombre:cliente.value,
ape:apellidos.value,
dni:dni.value,
cuota:cuota
};
}

function enviar(){
let d=window.sim;
if(!d){alert("Primero calcula");return;}

let msg=`Simulación:
${d.nombre} ${d.ape}
DNI: ${d.dni}
Cuota: S/ ${d.cuota.toFixed(2)}`;

location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

function filtrar(){
let texto=dni.value.toLowerCase();
let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

let c=data.find(x=>
(x.dni+"").includes(texto)||
(x.nombre+"").toLowerCase().includes(texto)
);

if(!c){alert("No encontrado");return;}

let msg=`Filtro:
${c.nombre} ${c.apellidos}
DNI: ${c.dni}`;

location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

function registrarPago(){
let m=parseFloat(pago.value);
if(isNaN(m)){alert("Ingresa pago");return;}
estadoPago.innerHTML="Pago registrado: S/ "+m;
}

function guardarCliente(){
let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

data.push({
nombre:c_nombre.value,
apellidos:c_apellidos.value,
dni:c_dni.value,
monto:c_monto.value
});

localStorage.setItem("cartera_"+asesor,JSON.stringify(data));
renderClientes();
}

function renderClientes(){
let lista=document.getElementById("listaClientes");
let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

lista.innerHTML="";

data.forEach(c=>{
lista.innerHTML+=`
<div class="item">
<b>${c.nombre} ${c.apellidos}</b><br>
DNI: ${c.dni}<br>
Monto: S/ ${c.monto}
</div>`;
});
}

function enviarQR(tipo,link){

let mensaje=`💳 Credicompany

Puede realizar su pago vía ${tipo}

Escanee el siguiente código:
${link}

Luego enviar su comprobante.`;

location.href="https://wa.me/?text="+encodeURIComponent(mensaje);

}

</script>

</body>
</html>
