<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
}

.header{text-align:center;padding:20px;}
.header img{width:150px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#10c251;
color:white;
font-weight:bold;
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<select id="frecuencia">
<option>Semanal</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<button onclick="enviarPago()">📲 Enviar simulación</button>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<h3>💳 Selecciona medio de pago</h3>

<h4>BBVA</h4>
<img src="bbva_qr.jpg" onclick="enviarQR('BBVA')">

<h4>Yape</h4>
<img src="yape_qr.jpg" onclick="enviarQR('Yape')">

</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion={};

// LOGIN
function login(){
if(usuario.value && clave.value){
loginDiv.style.display="none";
app.style.display="block";
}
}

// NAV
function mostrar(p){
simulador.style.display="none";
pagos.style.display="none";
document.getElementById(p).style.display="block";
}

// SIMULADOR
function calcular(){

let m=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

let i=Math.pow(1+t,1/4)-1;

let cuota=m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

resultado.innerHTML=`Cuota: S/ ${cuota.toFixed(2)}`;

ultimaSimulacion={monto:m,cuota:cuota};

}

// 🔥 ENVÍO SIMULACIÓN
function enviarPago(){

let msg=`💳 Credicompany

Monto: S/ ${ultimaSimulacion.monto}
Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}

Seleccione medio de pago`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// 🔥 ENVÍO QR SEGÚN CLICK
function enviarQR(tipo){

let linkQR="";

// 👉 CAMBIA ESTOS LINKS
if(tipo=="BBVA"){
linkQR="https://i.postimg.cc/abcd/bbva_qr.jpg";
}

if(tipo=="Yape"){
linkQR="https://i.postimg.cc/abcd/yape_qr.jpg";
}

let mensaje=`💳 Credicompany

Pago vía ${tipo}

Escanea aquí:
${linkQR}

Enviar comprobante luego del pago`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));

}

</script>

</body>
</html>
