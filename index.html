<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Créditos - Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a3a63;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    text-align: center;
}
.logo {
    width: 180px;
    margin-bottom: 20px;
}
.card {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
}
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}
#resultado {
    margin-top: 10px;
    font-size: 14px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

<img src="LOGO-FONDO-AZUL.png" class="logo">

<div class="card">
<h2>Simulador de Crédito</h2>

<label>Tipo de crédito</label>
<select id="tipo">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<label>Monto (S/)</label>
<input type="number" id="monto">

<label>Tasa (%)</label>
<input type="number" id="tasa">

<label>Plazo</label>
<input type="number" id="plazo">

<button onclick="simular()">Calcular</button>

<div id="resultado"></div>

</div>
</div>

<script>

function simular() {

let monto = parseFloat(document.getElementById("monto").value);
let tasa = parseFloat(document.getElementById("tasa").value) / 100;
let plazo = parseInt(document.getElementById("plazo").value);
let tipo = document.getElementById("tipo").value;

// Ajuste de tasa según tipo
if (tipo === "diario") {
    tasa = tasa / 30;
} else if (tipo === "semanal") {
    tasa = tasa / 4;
} else if (tipo === "quincenal") {
    tasa = tasa / 2;
}

// Cálculo
let saldo = monto;
let html = "";

for (let i = 1; i <= plazo; i++) {

    let interes = saldo * tasa;
    let capital = monto / plazo;
    let cuota = capital + interes;

    saldo -= capital;

    html += `
    <p>
    <b>Cuota ${i}</b><br>
    Cuota: S/ ${cuota.toFixed(2)}<br>
    Interés: S/ ${interes.toFixed(2)}<br>
    Capital: S/ ${capital.toFixed(2)}
    </p>
    `;
}

document.getElementById("resultado").innerHTML = html;

}

// Service Worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
