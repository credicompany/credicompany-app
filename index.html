<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#123B63;
  color:#333;
}

.header{
  text-align:center;
  padding:20px;
  color:white;
}

.header img{
  width:120px;
}

.card{
  background:#f2f2f2;
  margin:15px;
  padding:20px;
  border-radius:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#10c251;
  color:white;
  font-size:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:#123B63;
  color:white;
  padding:8px;
}

td{
  padding:6px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<!-- LOGIN -->
<div class="card" id="loginDiv">
  <h3>Ingreso Asesor</h3>
  <input id="usuario" placeholder="Usuario">
  <input id="clave" placeholder="Clave" type="password">
  <button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="card">
<h3>Simulador de Crédito</h3>

<select id="frecuencia">
<option>Diario</option>
<option>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="N° cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<table id="tabla"></table>

</div>

<div class="card">
<h3>Cartera</h3>
<div id="cartera"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5G2MyTkYZT0b7RMfLoBegcfAY4-ewdkc",
  authDomain: "credicompany-88693.firebaseapp.com",
  projectId: "credicompany-88693",
  storageBucket: "credicompany-88693.firebasestorage.app",
  messagingSenderId: "890359636696",
  appId: "1:890359636696:web:ed8b77c84bd85f5a212dad",
  measurementId: "G-KQTDXKKX37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

</script>

<script>

// LOGIN SIMPLE
function login(){
  let u = document.getElementById("usuario").value;
  let c = document.getElementById("clave").value;

  if(u && c){
    document.getElementById("loginDiv").style.display="none";
    document.getElementById("app").style.display="block";
    cargarCartera(u);
  }else{
    alert("Ingrese datos");
  }
}

// SIMULADOR PRO
function calcular(){

let m = parseFloat(document.getElementById("monto").value);
let tasa = parseFloat(document.getElementById("tasa").value)/100;
let n = parseInt(document.getElementById("plazo").value);
let f = document.getElementById("frecuencia").value;

let i;

// CONVERSIÓN CORRECTA
if(f=="Diario") i = Math.pow(1+tasa,1/30)-1;
if(f=="Semanal") i = Math.pow(1+tasa,1/4)-1;
if(f=="Quincenal") i = Math.pow(1+tasa,1/2)-1;
if(f=="Mensual") i = tasa;

// CUOTA (FRANCÉS)
let cuota = m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

let saldo = m;

let tabla = "<tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

let totalInteres=0;

for(let k=1;k<=n;k++){
  let interes = saldo*i;
  let capital = cuota - interes;
  saldo -= capital;

  totalInteres += interes;

  tabla += `<tr>
  <td>${k}</td>
  <td>${interes.toFixed(2)}</td>
  <td>${capital.toFixed(2)}</td>
  <td>${cuota.toFixed(2)}</td>
  <td>${saldo.toFixed(2)}</td>
  </tr>`;
}

document.getElementById("tabla").innerHTML = tabla;

document.getElementById("resultado").innerHTML = `
Interés total: S/ ${totalInteres.toFixed(2)}<br>
Total a pagar: S/ ${(cuota*n).toFixed(2)}<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

}

// FIREBASE CARTERA
async function cargarCartera(usuario){

let contenedor = document.getElementById("cartera");
contenedor.innerHTML="Cargando...";

const querySnapshot = await window.db.collection("clientes").get();

let html="";

querySnapshot.forEach((doc) => {
  let d = doc.data();

  if(d.asesor == usuario){

    html += `
    <div style="margin-bottom:10px">
    <b>${d.nombre}</b><br>
    Estado: ${d.estado}<br>
    Saldo: S/ ${d.saldo}
    </div>
    `;
  }

});

contenedor.innerHTML = html || "Sin clientes";

}

</script>

</body>
</html>
