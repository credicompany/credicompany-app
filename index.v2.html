<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:100px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff8c00;}

.fila{
display:flex;
gap:10px;
margin-top:10px;
}

.fila button{width:50%;}

.card img{
width:100%;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
}

th, td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI / Buscar cliente">
<input id="telefono" placeholder="Teléfono (Ej: 51999999999)">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal" selected>Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Número de cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#999;margin-top:5px;">🔄 Nuevo</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar</button>
<button class="btn-azul" onclick="filtrar()">🔍 Filtrar</button>
</div>

<!-- 🔥 SOLO AGREGADO -->
<button class="btn-naranja" onclick="recordatorio()" style="margin-top:10px;">
⏰ Recordatorio de pago
</button>

<div id="cronograma"></div>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<h3>💳 Medios de Pago</h3>

<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg" onclick="enviarQR('Principal')">
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg" onclick="enviarQR('BBVA')">
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg" onclick="enviarQR('BCP')">
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg" onclick="enviarQR('Yape')">

</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion={};

// LOGIN
function login(){
let u=document.getElementById("usuario").value.trim().toLowerCase();
let c=document.getElementById("clave").value.trim();

if(u==="admin" && c==="1234"){
document.getElementById("nombreAsesor").innerText=u;
document.getElementById("loginDiv").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Usuario o clave incorrectos");
}
}

// CAMBIO
function mostrar(p){
document.getElementById("simulador").style.display="none";
document.getElementById("pagos").style.display="none";
document.getElementById(p).style.display="block";
}

// LIMPIAR
function limpiar(){
["cliente","apellidos","dni","telefono","monto","tasa","plazo"].forEach(id=>{
document.getElementById(id).value="";
});
document.getElementById("resultado").innerHTML="";
document.getElementById("cronograma").innerHTML="";
}

// CALCULAR (NO TOCADO)
function calcular(){

let nombre=cliente.value.trim();
let ape=apellidos.value.trim();
let doc=dni.value.trim();
let tel=telefono.value.trim();

let P=parseFloat(monto.value);
let tasaVal=parseFloat(tasa.value);
let n=parseInt(plazo.value);
let prod=producto.value;

if(!nombre||!ape||!doc||!tel){
alert("Completa todos los datos");
return;
}

let i=0;
if(prod==="semanal") i=(tasaVal/4)/100;
if(prod==="diario") i=(tasaVal/30)/100;
if(prod==="quincenal") i=(tasaVal/2)/100;
if(prod==="mensual") i=(tasaVal)/100;

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML=`Producto: ${prod.toUpperCase()}<br>Cuota: S/ ${cuota.toFixed(2)}`;

ultimaSimulacion={P,cuota,n,prod,i,nombre,ape,doc,tel};

// CRONOGRAMA
let saldo=P;
let html="<table><tr><th>#</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Saldo</th></tr>";

for(let k=1;k<=Math.min(3,n);k++){
let interes=saldo*i;
let capital=cuota-interes;
saldo-=capital;

html+=`<tr>
<td>${k}</td>
<td>${cuota.toFixed(2)}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

html+="</table>";
cronograma.innerHTML=html;

// GUARDAR
let data=JSON.parse(localStorage.getItem("clientes")||"[]");
data.push({nombre,apellidos:ape,dni:doc,telefono:tel});
localStorage.setItem("clientes",JSON.stringify(data));

}

// ENVIAR
function enviar(){
let d=ultimaSimulacion;
if(!d.tel){ alert("Primero calcula"); return; }

let msg=`📌 Simulación Credicompany

Cliente: ${d.nombre} ${d.ape}
DNI: ${d.doc}

Producto: ${d.prod.toUpperCase()}
Monto: S/ ${d.P}
Cuota: S/ ${d.cuota.toFixed(2)}
Cuotas: ${d.n}`;

location.href=`https://wa.me/${d.tel}?text=`+encodeURIComponent(msg);
}

// FILTRAR → CLIENTE (NO TOCADO)
function filtrar(){

let texto=dni.value.toLowerCase();
let data=JSON.parse(localStorage.getItem("clientes")||"[]");

let c=data.find(x=>
(x.dni+"").includes(texto)||
(x.nombre+"").toLowerCase().includes(texto)
);

if(!c){
alert("Cliente no encontrado");
return;
}

cliente.value=c.nombre;
apellidos.value=c.apellidos;
telefono.value=c.telefono;

let msg=`${c.nombre} ${c.apellidos}
DNI: ${c.dni}`;

location.href=`https://wa.me/${c.telefono}?text=`+encodeURIComponent(msg);
}

// 🔥 SOLO NUEVO (NO ROMPE NADA)
function recordatorio(){

let nombre=cliente.value;
let ape=apellidos.value;
let tel=telefono.value;

if(!tel){
alert("Ingrese o filtre cliente");
return;
}

let msg=`⏰ Recordatorio de pago

Estimado(a) ${nombre} ${ape},
le recordamos su pago pendiente.

Credicompany`;

location.href=`https://wa.me/${tel}?text=`+encodeURIComponent(msg);
}

// QR
function enviarQR(tipo){
location.href="https://wa.me/?text=Pago "+tipo;
}

</script>

</body>
</html>
