<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0a2f5c;
color:white;
}

.header{
padding:20px;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
color:#333;
border-radius:20px;
padding:20px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#f2f4f7;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-weight:bold;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.menu button{
background:none;
color:#0a2f5c;
font-weight:bold;
}

.hidden{
display:none;
}

.result{
background:#f4f4f4;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Credicompany</div>

<!-- LOGIN -->
<div id="login" class="container">
<div class="card">
<h3>Ingreso Asesor</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<h3>Simulador</h3>

<input id="monto" placeholder="Monto">

<input id="tea" placeholder="TEA % (Ej: 120)">

<input id="plazo" placeholder="Cuotas">

<select id="frecuencia">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<button onclick="calcular()">Calcular</button>

<div id="resultado" class="result"></div>

<button onclick="enviarWhatsApp()">📲 Enviar WhatsApp</button>

</div>

<!-- REGISTRO -->
<div id="registro" class="card">
<h3>Registrar Cliente</h3>

<input id="dni" placeholder="DNI">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<button onclick="guardarCliente()">Guardar Cliente</button>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card">
<h3>Clientes</h3>
<div id="lista"></div>
</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('registro')">Registrar</button>
<button onclick="mostrar('clientes')">Clientes</button>
</div>

</div>

<script>

// LOGIN
function login(){
if(user.value=="admin" && pass.value=="1234"){
loginDiv.classList.add("hidden");
appDiv.classList.remove("hidden");
}else{
alert("Error");
}
}

// NAV
function mostrar(p){
simulador.classList.add("hidden");
registro.classList.add("hidden");
clientes.classList.add("hidden");

if(p=="simulador") simulador.classList.remove("hidden");
if(p=="registro") registro.classList.remove("hidden");
if(p=="clientes"){
clientes.classList.remove("hidden");
mostrarClientes();
}
}

// SIMULADOR CON TEA
let simulacion={};

function calcular(){

let m=parseFloat(monto.value);
let tea=parseFloat(teaInput.value)/100;
let n=parseInt(plazo.value);
let f=frecuencia.value;

let i;

if(f=="diario") i=Math.pow(1+tea,1/360)-1;
if(f=="semanal") i=Math.pow(1+tea,1/52)-1;
if(f=="quincenal") i=Math.pow(1+tea,1/24)-1;
if(f=="mensual") i=Math.pow(1+tea,1/12)-1;

// fórmula financiera correcta
let cuota = m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

let total=cuota*n;
let interes=total-m;

resultado.innerHTML=`
Monto: S/ ${m}<br>
TEA: ${(tea*100).toFixed(2)}%<br>
Interés: S/ ${interes.toFixed(2)}<br>
Total: S/ ${total.toFixed(2)}<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

simulacion={
monto:m,
cuota:cuota,
total:total
};

}

// WHATSAPP
function enviarWhatsApp(){
if(!simulacion.monto) return alert("Primero calcula");

let texto=`Simulación Credicompany:

Monto: S/ ${simulacion.monto}
Cuota: S/ ${simulacion.cuota.toFixed(2)}
Total: S/ ${simulacion.total.toFixed(2)}

¿Desea continuar?`;

window.open("https://wa.me/?text="+encodeURIComponent(texto));
}

// GUARDAR
function guardarCliente(){

let data=JSON.parse(localStorage.getItem("clientes"))||[];

data.push({
dni:dni.value,
nombre:nombre.value,
telefono:telefono.value,
monto:simulacion.monto,
cuota:simulacion.cuota
});

localStorage.setItem("clientes",JSON.stringify(data));

alert("Guardado");

mostrarClientes();
}

// MOSTRAR
function mostrarClientes(){

let data=JSON.parse(localStorage.getItem("clientes"))||[];

let html="";

data.forEach(c=>{
html+=`
<div>
<b>${c.nombre}</b><br>
Monto: ${c.monto}<br>
Cuota: ${c.cuota.toFixed(2)}
</div>`;
});

lista.innerHTML=html;
}

// refs
const loginDiv=document.getElementById("login");
const appDiv=document.getElementById("app");

const simulador=document.getElementById("simulador");
const registro=document.getElementById("registro");
const clientes=document.getElementById("clientes");

const teaInput=document.getElementById("tea");

</script>

</body>
</html>
Compromiso y Honestidad, crecemos juntos...
