<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.asesor{font-size:14px;margin-top:5px;opacity:0.8;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

.card img{
width:100%;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
}

th, td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div class="asesor">Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI / Buscar cliente">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Número de cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#999;margin-top:5px;">🔄 Nuevo</button>

<div id="resultado"></div>
<div id="cronograma"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar</button>
<button class="btn-azul" onclick="filtrar()">🔍 Filtrar</button>
</div>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<h3>💳 Medios de Pago</h3>

<h4>Cuenta Principal</h4>
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg" onclick="enviarQR('Principal')">

<h4>BBVA</h4>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg" onclick="enviarQR('BBVA')">

<h4>BCP</h4>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg" onclick="enviarQR('BCP')">

<h4>Yape</h4>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg" onclick="enviarQR('Yape')">

</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion = {};
let asesor="";

// LOGIN
function login(){
if(usuario.value=="admin" && clave.value=="1234"){
asesor=usuario.value;
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
app.style.display="block";
}else{
alert("Datos incorrectos");
}
}

// CAMBIO PANTALLA
function mostrar(p){
simulador.style.display="none";
pagos.style.display="none";
document.getElementById(p).style.display="block";
}

// LIMPIAR
function limpiar(){
cliente.value="";
apellidos.value="";
dni.value="";
monto.value="";
tasa.value="";
plazo.value="";
resultado.innerHTML="";
cronograma.innerHTML="";
}

// CALCULAR
function calcular(){

let nombre=cliente.value.trim();
let ape=apellidos.value.trim();
let doc=dni.value.trim();

let P=parseFloat(monto.value);
let tasaInput=parseFloat(tasa.value);
let n=parseInt(plazo.value);
let producto=document.getElementById("producto").value;

if(!nombre||!ape||!doc||!P||!tasaInput||!n){
alert("Completa todos los datos");
return;
}

let i;

if(producto=="diario") i=(tasaInput/30)/100;
if(producto=="semanal") i=(tasaInput/4)/100;
if(producto=="quincenal") i=(tasaInput/2)/100;
if(producto=="mensual") i=(tasaInput)/100;

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML=`Producto: ${producto.toUpperCase()}<br>Cuota: S/ ${cuota.toFixed(2)}`;

ultimaSimulacion={P,cuota,n,producto,i};

// GUARDAR CLIENTE
let data=JSON.parse(localStorage.getItem("clientes")||"[]");

data.push({nombre,apellidos:ape,dni:doc});
localStorage.setItem("clientes",JSON.stringify(data));

// CRONOGRAMA
let saldo=P;
let tabla="<table><tr><th>#</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Saldo</th></tr>";

for(let k=1;k<=Math.min(3,n);k++){
let interes=saldo*i;
let capital=cuota-interes;
saldo-=capital;

tabla+=`<tr>
<td>${k}</td>
<td>${cuota.toFixed(2)}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

tabla+="</table>";
cronograma.innerHTML=tabla;

}

// FILTRAR → WHATSAPP
function filtrar(){

let texto=dni.value.trim().toLowerCase();

let data=JSON.parse(localStorage.getItem("clientes")||"[]");

let cliente=data.find(c=>
(c.dni+"").toLowerCase().includes(texto)||
(c.nombre+"").toLowerCase().includes(texto)||
(c.apellidos+"").toLowerCase().includes(texto)
);

if(!cliente){
alert("Cliente no encontrado");
return;
}

let msg=`👤 Cliente encontrado

Nombre: ${cliente.nombre}
Apellidos: ${cliente.apellidos}
DNI: ${cliente.dni}`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// ENVIAR SIMULACIÓN
function enviar(){

if(!ultimaSimulacion.P){
alert("Primero calcula");
return;
}

let msg=`📌 Simulación

💰 Monto: S/ ${ultimaSimulacion.P}
💵 Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}
📅 Plazo: ${ultimaSimulacion.n}
📊 Producto: ${ultimaSimulacion.producto}`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// ENVIAR QR
function enviarQR(tipo){

let link="";

if(tipo=="Principal") link="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg";
if(tipo=="BBVA") link="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg";
if(tipo=="BCP") link="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg";
if(tipo=="Yape") link="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg";

let mensaje=`💳 Pago vía ${tipo}

Escanea aquí:
${link}`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));
}

</script>

</body>
</html>
