<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0a2f5c;
color:white;
}

.header{
display:flex;
justify-content:center;
padding:20px;
}
.header img{ width:180px; }

.container{ padding:15px; }

.card{
background:white;
color:#333;
border-radius:20px;
padding:20px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#f2f4f7;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-weight:bold;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.menu button{
background:none;
color:#0a2f5c;
font-weight:bold;
}

.hidden{ display:none; }

.result{
background:#f4f4f4;
padding:10px;
margin-top:10px;
border-radius:10px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<!-- LOGIN -->
<div id="login" class="container">
<div class="card">
<h3>Ingreso Asesor</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<h3>Simulador</h3>

<select id="frecuencia">
<option>Diario</option>
<option selected>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="tasa" placeholder="Tasa (%)">
<input id="monto" placeholder="Monto">
<input id="plazo" placeholder="N° cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resumen" class="result"></div>
<div id="tabla"></div>

<button onclick="registrarVenta()">💰 Registrar como venta</button>

</div>

<!-- METAS -->
<div id="metas" class="card hidden">
<h3>Metas de Asesores</h3>

<input id="asesorNombre" placeholder="Nombre asesor">
<input id="metaMonto" placeholder="Meta mensual">

<button onclick="guardarMeta()">Guardar Meta</button>

<div id="listaMetas"></div>
</div>

<!-- RANKING -->
<div id="ranking" class="card hidden">
<h3>Ranking de Asesores</h3>
<div id="listaRanking"></div>
</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('metas')">Metas</button>
<button onclick="mostrar('ranking')">Ranking</button>
</div>

</div>

<script>

let usuarioActual="";

// LOGIN
function login(){
if(user.value && pass.value){
usuarioActual=user.value;
loginDiv.classList.add("hidden");
appDiv.classList.remove("hidden");
}
}

// NAV
function mostrar(p){
simulador.classList.add("hidden");
metas.classList.add("hidden");
ranking.classList.add("hidden");

if(p=="simulador") simulador.classList.remove("hidden");
if(p=="metas"){ metas.classList.remove("hidden"); verMetas(); }
if(p=="ranking"){ ranking.classList.remove("hidden"); verRanking(); }
}

// SIMULADOR
let ultimaSimulacion={};

function calcular(){

let m=parseFloat(monto.value);
let TEM=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);
let f=frecuencia.value;

let i;

if(f=="Diario") i=Math.pow(1+TEM,1/30)-1;
if(f=="Semanal") i=Math.pow(1+TEM,1/4)-1;
if(f=="Quincenal") i=Math.pow(1+TEM,1/2)-1;
if(f=="Mensual") i=TEM;

let cuota=m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);
let total=cuota*n;

resumen.innerHTML=`Cuota: S/ ${cuota.toFixed(2)}<br>Total: S/ ${total.toFixed(2)}`;

ultimaSimulacion={
monto:m,
total:total
};
}

// REGISTRAR VENTA
function registrarVenta(){

if(!ultimaSimulacion.monto) return alert("Simula primero");

let ventas=JSON.parse(localStorage.getItem("ventas"))||[];

ventas.push({
asesor:usuarioActual,
monto:ultimaSimulacion.monto
});

localStorage.setItem("ventas",JSON.stringify(ventas));

alert("Venta registrada");
}

// METAS
function guardarMeta(){

let metas=JSON.parse(localStorage.getItem("metas"))||[];

metas.push({
asesor:asesorNombre.value,
meta:parseFloat(metaMonto.value)
});

localStorage.setItem("metas",JSON.stringify(metas));

verMetas();
}

function verMetas(){

let metas=JSON.parse(localStorage.getItem("metas"))||[];

let html="";

metas.forEach(m=>{
html+=`<div>${m.asesor} - Meta: ${m.meta}</div>`;
});

listaMetas.innerHTML=html;
}

// RANKING
function verRanking(){

let ventas=JSON.parse(localStorage.getItem("ventas"))||[];
let resumen={};

ventas.forEach(v=>{
if(!resumen[v.asesor]) resumen[v.asesor]=0;
resumen[v.asesor]+=v.monto;
});

let html="";

Object.entries(resumen)
.sort((a,b)=>b[1]-a[1])
.forEach(r=>{
html+=`<div>${r[0]} - S/ ${r[1]}</div>`;
});

listaRanking.innerHTML=html;
}

// refs
const loginDiv=document.getElementById("login");
const appDiv=document.getElementById("app");

const simulador=document.getElementById("simulador");
const metas=document.getElementById("metas");
const ranking=document.getElementById("ranking");

</script>

</body>
</html>
