<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">

<title>Credicompany</title>

<style>

body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:120px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

.volver{
position:sticky;
top:0;
background:#0a2f5c;
color:white;
padding:14px;
border-radius:12px;
text-align:center;
font-weight:bold;
margin-bottom:15px;
cursor:pointer;
}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:25px;
border-radius:15px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso</h3>
<input id="usuario">
<input id="clave" type="password">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="enviarUbicacion()">📍 Ubicación</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>
<div id="cronograma"></div>

<div class="fila">
<button class="btn-verde" onclick="enviarSimulacion()">Simulación</button>
<button class="btn-azul" onclick="enviarFiltro()">Filtro</button>
</div>

<button class="btn-naranja" onclick="limpiar()">Limpiar</button>

</div>

</div>

<script>

let asesor="";

function login(){
asesor="admin";
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
dashboard.style.display="block";
}

function mostrar(p){
dashboard.style.display="none";
app.style.display="block";
simulador.style.display="none";
document.getElementById(p).style.display="block";
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

function calcular(){

let P=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

let i=0;
let dias=0;

if(producto.value==="diario"){ i=t/30; dias=1; }
if(producto.value==="semanal"){ i=t/4; dias=7; }
if(producto.value==="quincenal"){ i=t/2; dias=15; }
if(producto.value==="mensual"){ i=t; dias=30; }

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);

// CRONOGRAMA COMPLETO
let html="<h4>Cronograma:</h4>";

let saldo = P;
let fecha = new Date();

for(let c=1;c<=n;c++){

let interes = saldo * i;
let capital = cuota - interes;
saldo = saldo - capital;

if(saldo < 0) saldo = 0;

fecha.setDate(fecha.getDate()+dias);

let dia = fecha.getDate().toString().padStart(2,'0');
let mes = (fecha.getMonth()+1).toString().padStart(2,'0');
let anio = fecha.getFullYear();

let fechaTexto = `${dia}/${mes}/${anio}`;

html+=`
<div class="item">
<b>Cuota ${c}</b><br>
Fecha: ${fechaTexto}<br>
Cuota: S/ ${cuota.toFixed(2)}<br>
Interés: S/ ${interes.toFixed(2)}<br>
Capital: S/ ${capital.toFixed(2)}<br>
Saldo: S/ ${saldo.toFixed(2)}
</div>
`;

}

cronograma.innerHTML=html;

}

function enviarSimulacion(){
let msg=`Producto:${producto.value} Monto:${monto.value} ${resultado.innerText}`;
location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

function enviarFiltro(){
let msg=`${cliente.value} ${apellidos.value} DNI:${dni.value}`;
location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

function limpiar(){
cliente.value="";
apellidos.value="";
dni.value="";
monto.value="";
tasa.value="";
plazo.value="";
resultado.innerHTML="";
cronograma.innerHTML="";
}

function enviarUbicacion(){
let msg = `📍 Ubicación Asesor

Asesor: ${asesor}

Por favor envía tu ubicación actual:
(Adjuntar > Ubicación)`;

window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}

</script>

</body>
</html>
