<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0a2f5c;
color:white;
}

.header{
padding:20px;
font-size:20px;
font-weight:bold;
}

.container{ padding:15px; }

.card{
background:white;
color:#333;
border-radius:20px;
padding:20px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#f2f4f7;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-weight:bold;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.menu button{
background:none;
color:#0a2f5c;
font-weight:bold;
}

.hidden{ display:none; }

.result{
background:#f4f4f4;
padding:10px;
margin-top:10px;
border-radius:10px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">Credicompany</div>

<!-- LOGIN -->
<div id="login" class="container">
<div class="card">
<h3>Ingreso Asesor</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<h3>Simulador</h3>

<label>Producto</label>
<select id="frecuencia">
<option>Diario</option>
<option selected>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<label>Tasa (%)</label>
<input id="tasa" placeholder="Ej: 21">

<input id="monto" placeholder="Monto">
<input id="plazo" placeholder="N° cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resumen" class="result"></div>
<div id="tabla"></div>

<button onclick="enviarWhatsApp()">📲 Enviar WhatsApp</button>

</div>

<!-- REGISTRO -->
<div id="registro" class="card hidden">
<h3>Registrar Cliente</h3>

<input id="dni" placeholder="DNI">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<button onclick="guardarCliente()">Guardar Cliente</button>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card hidden">
<h3>Clientes</h3>
<div id="lista"></div>
</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('registro')">Registrar</button>
<button onclick="mostrar('clientes')">Clientes</button>
</div>

</div>

<script>

// LOGIN
function login(){
if(user.value=="admin" && pass.value=="1234"){
loginDiv.classList.add("hidden");
appDiv.classList.remove("hidden");
}else{
alert("Error");
}
}

// NAV
function mostrar(p){
simulador.classList.add("hidden");
registro.classList.add("hidden");
clientes.classList.add("hidden");

if(p=="simulador") simulador.classList.remove("hidden");
if(p=="registro") registro.classList.remove("hidden");
if(p=="clientes"){
clientes.classList.remove("hidden");
mostrarClientes();
}
}

// SIMULADOR (TU LÓGICA EXACTA)
let ultimaSimulacion={};

function calcular(){

let m=parseFloat(monto.value);
let TEM=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);
let f=frecuencia.value;

if(!m || !TEM || !n){
alert("Completa datos");
return;
}

let i;

if(f=="Diario") i=Math.pow(1+TEM,1/30)-1;
if(f=="Semanal") i=Math.pow(1+TEM,1/4)-1;
if(f=="Quincenal") i=Math.pow(1+TEM,1/2)-1;
if(f=="Mensual") i=TEM;

// CUOTA
let cuota=m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);
let total=cuota*n;

// CRONOGRAMA
let saldo=m;

let html="<table>";
html+="<tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

for(let k=1;k<=n;k++){

let interes=saldo*i;
let capital=cuota-interes;
saldo-=capital;

html+=`
<tr>
<td>${k}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${cuota.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>
`;
}

html+="</table>";

resumen.innerHTML=`
Cuota: S/ ${cuota.toFixed(2)}<br>
Total: S/ ${total.toFixed(2)}
`;

tabla.innerHTML=html;

ultimaSimulacion={
monto:m,
cuota:cuota,
total:total
};

}

// WHATSAPP
function enviarWhatsApp(){
if(!ultimaSimulacion.monto) return alert("Primero calcula");

let texto=`Simulación Credicompany:

Monto: S/ ${ultimaSimulacion.monto}
Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}
Total: S/ ${ultimaSimulacion.total.toFixed(2)}

¿Desea continuar?`;

window.open("https://wa.me/?text="+encodeURIComponent(texto));
}

// CLIENTES
function guardarCliente(){

let data=JSON.parse(localStorage.getItem("clientes"))||[];

data.push({
dni:dni.value,
nombre:nombre.value,
telefono:telefono.value,
monto:ultimaSimulacion.monto,
cuota:ultimaSimulacion.cuota
});

localStorage.setItem("clientes",JSON.stringify(data));

alert("Cliente guardado");

mostrarClientes();
}

function mostrarClientes(){

let data=JSON.parse(localStorage.getItem("clientes"))||[];

let html="";

data.forEach(c=>{
html+=`
<div style="margin-bottom:10px;">
<b>${c.nombre}</b><br>
Monto: ${c.monto}<br>
Cuota: ${c.cuota.toFixed(2)}
</div>`;
});

lista.innerHTML=html;
}

// refs
const loginDiv=document.getElementById("login");
const appDiv=document.getElementById("app");

const simulador=document.getElementById("simulador");
const registro=document.getElementById("registro");
const clientes=document.getElementById("clientes");

</script>

</body>
</html>
