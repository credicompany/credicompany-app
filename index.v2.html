<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
}

.header{
display:flex;
justify-content:center;
align-items:center;
padding:30px 10px;
}

.header img{
width:180px;
}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
margin-top:30px;
}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#10c251;
color:white;
font-weight:bold;
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:15px;
cursor:pointer;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<select id="producto" onchange="configurarProducto()">
<option value="">Seleccione producto</option>
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%) anual">
<input id="plazo" placeholder="Número de cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<button onclick="enviar()">📲 Enviar simulación</button>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<h3>💳 Medios de Pago</h3>

<h4>Cuenta Recaudadora</h4>
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg" onclick="enviarQR('PRINCIPAL')">

<h4>BBVA</h4>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg" onclick="enviarQR('BBVA')">

<h4>BCP</h4>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg" onclick="enviarQR('BCP')">

<h4>Yape</h4>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg" onclick="enviarQR('Yape')">

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion = {};
let periodos = 12;

// CAMBIO DE PANTALLA
function mostrar(p){
document.getElementById("simulador").style.display="none";
document.getElementById("pagos").style.display="none";
document.getElementById(p).style.display="block";
}

// CONFIGURACIÓN PRODUCTO
function configurarProducto(){

let p = document.getElementById("producto").value;
let tasa = document.getElementById("tasa");

if(p=="diario"){
tasa.value = 120;
periodos = 360;
}

if(p=="semanal"){
tasa.value = 80;
periodos = 52;
}

if(p=="quincenal"){
tasa.value = 60;
periodos = 24;
}

if(p=="mensual"){
tasa.value = 40;
periodos = 12;
}

}

// CÁLCULO
function calcular(){

let m = parseFloat(document.getElementById("monto").value);
let t = parseFloat(document.getElementById("tasa").value)/100;
let n = parseInt(document.getElementById("plazo").value);
let producto = document.getElementById("producto").value;

if(!m || !t || !n || !producto){
alert("Completa todos los datos");
return;
}

let i = Math.pow(1+t,1/periodos)-1;

let cuota = m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

document.getElementById("resultado").innerHTML = `
Producto: ${producto.toUpperCase()}<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

ultimaSimulacion = {producto, monto:m, cuota:cuota};

}

// WHATSAPP SIMULACIÓN
function enviar(){

if(!ultimaSimulacion.monto){
alert("Primero calcula");
return;
}

let msg = `💳 Credicompany

Producto: ${ultimaSimulacion.producto}
Monto: S/ ${ultimaSimulacion.monto}
Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}

Seleccione medio de pago`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));

}

// WHATSAPP QR
function enviarQR(tipo){

let link="";

if(tipo=="PRINCIPAL"){
link="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg";
}

if(tipo=="BBVA"){
link="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg";
}

if(tipo=="BCP"){
link="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg";
}

if(tipo=="Yape"){
link="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg";
}

let mensaje = `💳 Credicompany

Pago vía ${tipo}

Escanea aquí:
${link}

Enviar comprobante`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));

}

</script>

</body>
</html>
