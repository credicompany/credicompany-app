<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#0a3a63;color:white;text-align:center;}
.container{padding:20px;}
.card{background:white;color:black;border-radius:15px;padding:15px;margin:10px;}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#28a745;color:white;font-weight:bold;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h2>Credicompany</h2>

<!-- LOGIN -->
<div id="login" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3>Registrar Cliente</h3>

<input id="dni" placeholder="DNI">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="monto" placeholder="Monto">

<button onclick="guardarCliente()">Guardar Cliente</button>

</div>

<div class="card">
<h3>Clientes Registrados</h3>
<div id="lista"></div>
</div>

</div>

</div>

<script>

// USUARIOS
const usuarios = [
{user:"admin",pass:"1234"},
{user:"asesor1",pass:"1234"}
];

let asesorActivo = "";

// LOGIN
function login(){
let u = usuario.value;
let c = clave.value;

let valido = usuarios.find(x=>x.user===u && x.pass===c);

if(valido){
asesorActivo = u;
loginDiv.classList.add("hidden");
appDiv.classList.remove("hidden");
mostrarClientes();
}else{
alert("Datos incorrectos");
}
}

// GUARDAR CLIENTE
function guardarCliente(){

let cliente = {
dni: dni.value,
nombre: nombre.value,
telefono: telefono.value,
monto: monto.value,
asesor: asesorActivo
};

let data = JSON.parse(localStorage.getItem("clientes")) || [];

data.push(cliente);

localStorage.setItem("clientes", JSON.stringify(data));

alert("Cliente guardado");

mostrarClientes();

}

// MOSTRAR CLIENTES
function mostrarClientes(){

let data = JSON.parse(localStorage.getItem("clientes")) || [];

let filtrado = data.filter(x=>x.asesor===asesorActivo);

let html = "";

filtrado.forEach(c=>{
html += `
<div style="border-bottom:1px solid #ccc;padding:5px">
<b>${c.nombre}</b><br>
DNI: ${c.dni}<br>
Monto: ${c.monto}
</div>`;
});

lista.innerHTML = html;
}

// referencias
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const usuario = document.getElementById("usuario");
const clave = document.getElementById("clave");
const dni = document.getElementById("dni");
const nombre = document.getElementById("nombre");
const telefono = document.getElementById("telefono");
const monto = document.getElementById("monto");
const lista = document.getElementById("lista");

</script>

</body>
</html>
