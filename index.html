<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a3a63">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a3a63;
}

.container{
    text-align:center;
    padding-top:20px;
}

.logo{
    width:200px;
}

.card{
    background:#eaeaea;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    margin:auto;
}

button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    font-weight:bold;
}

#instalar{
    background:#007bff;
    color:white;
    display:none;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="card">

<h3>Credicompany App</h3>

<button id="instalar">📲 Instalar App</button>

</div>
</div>

<script>

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

// INSTALAR APP
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("instalar").style.display = "block";
});

document.getElementById("instalar").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});

</script>

</body>
</html>
