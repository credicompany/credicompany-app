<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credicompany</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;}
.header{text-align:center;padding:20px;}
.header img{width:180px;}
.card{background:#f2f2f2;color:#333;margin:15px;padding:20px;border-radius:15px;}
.volver{background:#0a2f5c;color:white;padding:12px;border-radius:10px;text-align:center;margin-bottom:10px;cursor:pointer;}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;}
button{padding:12px;border:none;border-radius:10px;color:white;font-weight:bold;width:100%;}
.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px;}
.box{background:white;color:#123B63;padding:20px;border-radius:15px;text-align:center;font-weight:bold;cursor:pointer;}
.fila{display:flex;gap:10px;margin-top:10px;}
.item{background:white;padding:12px;margin-top:10px;border-radius:10px;color:#333;}
</style>

</head>
<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="enviarUbicacion()">📍 Ubicación</div>
<div class="box" onclick="mostrar('admin')">⚙️ Usuarios</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>
<div id="cronograma"></div>

<button class="btn-verde" onclick="enviarSimulacion()">Enviar WhatsApp</button>
<button class="btn-naranja" onclick="limpiar()">Limpiar</button>
</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input type="file" id="excelFile" accept=".xlsx">
<button class="btn-azul" onclick="cargarExcel()">📂 Cargar Excel</button>

<div class="fila">
<button style="background:#2ecc71" onclick="filtrarMora(0,8)">0-8</button>
<button style="background:#f1c40f;color:black" onclick="filtrarMora(9,30)">9-30</button>
</div>

<div class="fila">
<button style="background:#e74c3c" onclick="filtrarMora(31,60)">31-60</button>
<button style="background:black" onclick="filtrarMora(61,1000)">61+</button>
</div>

<button class="btn-azul" onclick="renderClientes()">Ver todos</button>

<div id="listaClientes"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input id="nuevoUser" placeholder="Usuario">
<input id="nuevoPass" placeholder="Clave">

<button class="btn-verde" onclick="crearUsuario()">Crear Usuario</button>

<div id="listaUsuarios"></div>
</div>

</div>

<script>

// 🔥 DEBUG GLOBAL
window.onerror = function(msg){
alert("ERROR JS: " + msg);
};

// LOGIN
function login(){
let user=usuario.value;
let pass=clave.value;

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

if(user==="admin" && pass==="1234"){
nombreAsesor.innerText="admin";
loginDiv.style.display="none";
dashboard.style.display="block";
return;
}

let ok=usuarios.find(u=>u.user===user && u.pass===pass);
if(!ok)return alert("Usuario incorrecto");

nombreAsesor.innerText=user;
loginDiv.style.display="none";
dashboard.style.display="block";
}

// 🔥 FIX NAVEGACIÓN
function mostrar(p){

let dash = document.getElementById("dashboard");
let appDiv = document.getElementById("app");

if(!dash || !appDiv){
alert("Error base no encontrada");
return;
}

dash.style.display="none";
appDiv.style.display="block";

["simulador","clientes","admin"].forEach(id=>{
let el = document.getElementById(id);
if(el) el.style.display="none";
});

let seccion = document.getElementById(p);
if(seccion){
seccion.style.display="block";
}else{
alert("Sección no encontrada: " + p);
}

if(p==="clientes") renderClientes();
if(p==="admin") renderUsuarios();
}

// VOLVER
function volver(){
app.style.display="none";
dashboard.style.display="block";
}

// NORMALIZADOR
function normalizar(txt){
return (txt||"").toLowerCase().replace(/\s/g,'').normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// BUSCADOR
function getValor(obj, claves){
for(let k in obj){
let nk=normalizar(k);
for(let c of claves){
if(nk.includes(normalizar(c))) return obj[k];
}
}
return "";
}

// EXCEL
function cargarExcel(){

let file=excelFile.files[0];
if(!file)return alert("Selecciona archivo");

let reader=new FileReader();

reader.onload=e=>{

let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:'array'});
let json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

let cartera=json.map(c=>{

let nombre=getValor(c,["nombre"]);
let apePat=getValor(c,["apellido paterno"]);
let apeMat=getValor(c,["apellido materno"]);

return{
nombreCompleto:`${nombre} ${apePat} ${apeMat}`.trim(),
asesor:getValor(c,["asesor"]),
monto:parseFloat(getValor(c,["monto"]))||0,
cuotaMora:parseFloat(getValor(c,["cuota","mora"]))||0,
retraso:parseFloat(getValor(c,["retraso","dias"]))||0,
telefono:getValor(c,["telefono","celular"]),
producto:getValor(c,["producto"]),
cuotas:getValor(c,["cuotas"]),
direccion:getValor(c,["direccion"]),
distrito:getValor(c,["distrito"])
};

});

localStorage.setItem("cartera",JSON.stringify(cartera));
alert("Excel cargado correctamente");
renderClientes();

};

reader.readAsArrayBuffer(file);
}

// CLIENTES
function renderClientes(){

let data=JSON.parse(localStorage.getItem("cartera"))||[];
listaClientes.innerHTML="";

data.forEach(c=>{

let color="#2ecc71";
if(c.retraso>8)color="#f1c40f";
if(c.retraso>30)color="#e74c3c";
if(c.retraso>60)color="black";

listaClientes.innerHTML+=`
<div class="item" style="border-left:6px solid ${color}">
<b>${c.nombreCompleto||"SIN NOMBRE"}</b><br>
💼 ${c.asesor||"-"}<br>
💰 S/ ${c.monto}<br>
📊 ${c.cuotaMora}<br>
⏱ ${c.retraso} días<br>
📦 ${c.producto||"-"}<br>
📉 ${c.cuotas||0}<br>
📍 ${c.direccion||"-"} - ${c.distrito||"-"}<br>
📞 ${c.telefono||"-"}
</div>`;
});
}

// FILTRO
function filtrarMora(min,max){
let data=JSON.parse(localStorage.getItem("cartera"))||[];
listaClientes.innerHTML="";
data.filter(c=>c.retraso>=min && c.retraso<=max)
.forEach(c=>{
listaClientes.innerHTML+=`<div class="item">${c.nombreCompleto} - ${c.retraso} días</div>`;
});
}

// USUARIOS
function crearUsuario(){
let data=JSON.parse(localStorage.getItem("usuarios"))||[];
data.push({user:nuevoUser.value,pass:nuevoPass.value});
localStorage.setItem("usuarios",JSON.stringify(data));
renderUsuarios();
}

function renderUsuarios(){
let data=JSON.parse(localStorage.getItem("usuarios"))||[];
listaUsuarios.innerHTML="";
data.forEach((u,i)=>{
listaUsuarios.innerHTML+=`
<div class="item">
${u.user}
<button onclick="eliminarUsuario(${i})">Eliminar</button>
</div>`;
});
}

function eliminarUsuario(i){
let data=JSON.parse(localStorage.getItem("usuarios"))||[];
data.splice(i,1);
localStorage.setItem("usuarios",JSON.stringify(data));
renderUsuarios();
}

// SIMULADOR
function calcular(){
let P=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

let i=t/30;
let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);
window.simData={monto:P,cuota:cuota.toFixed(2),producto:producto.value};
}

// LIMPIAR
function limpiar(){
document.querySelectorAll("input").forEach(i=>i.value="");
resultado.innerHTML="";
cronograma.innerHTML="";
}

// WHATSAPP
function enviarSimulacion(){
window.open("https://wa.me/?text="+encodeURIComponent(
`Monto:${simData.monto} Cuota:${simData.cuota} Producto:${simData.producto}`));
}

// GPS
function enviarUbicacion(){
navigator.geolocation.getCurrentPosition(p=>{
window.open("https://wa.me/?text="+encodeURIComponent(
`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`));
});
}

</script>

</body>
</html>
