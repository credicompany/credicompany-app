<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a3a63">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a3a63;
}

.container {
    text-align: center;
    padding-top: 20px;
}

.logo {
    width: 220px;
    margin-bottom: 10px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
    margin: auto;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #28a745;
    color: white;
    border: none;
    font-weight: bold;
}

/* BOTÓN INSTALAR */
#instalarApp {
    background: #007bff;
    display: none;
}

/* RESUMEN */
#resumen {
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
}

table {
    width: 100%;
    margin-top: 10px;
    font-size: 12px;
    border-collapse: collapse;
}

th {
    background: #0a3a63;
    color: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 5px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="card">

<h3>Simulador de Crédito</h3>

<select id="tipo">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input type="number" id="monto" placeholder="Monto (S/)">
<input type="number" id="tasa" placeholder="Tasa (%)">
<input type="number" id="plazo" placeholder="Plazo">

<button onclick="simular()">Calcular</button>

<!-- 🔥 BOTÓN INSTALAR -->
<button id="instalarApp">Instalar App</button>

<div id="resumen"></div>
<div id="resultado"></div>

</div>
</div>

<script>
function simular() {

let monto = parseFloat(document.getElementById("monto").value);
let tasaBase = parseFloat(document.getElementById("tasa").value) / 100;
let plazo = parseInt(document.getElementById("plazo").value);
let tipo = document.getElementById("tipo").value;

if (!monto || !tasaBase || !plazo) {
    alert("Completa los datos");
    return;
}

// ajuste de tasa
let tasa;
switch(tipo){
    case "diario": tasa = tasaBase/30; break;
    case "semanal": tasa = tasaBase/4; break;
    case "quincenal": tasa = tasaBase/2; break;
    case "mensual": tasa = tasaBase; break;
}

// sistema francés
let i = tasa;
let n = plazo;

let cuota = monto * (i * Math.pow(1+i,n)) / (Math.pow(1+i,n)-1);

let saldo = monto;

let totalPagar = cuota * n;
let totalInteres = totalPagar - monto;

// resumen
document.getElementById("resumen").innerHTML =
`Cuota: S/ ${cuota.toFixed(2)}<br>
Total: S/ ${totalPagar.toFixed(2)}<br>
Interés: S/ ${totalInteres.toFixed(2)}`;

// tabla
let html = "<table><tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

for(let k=1;k<=n;k++){
    let interes = saldo*i;
    let capital = cuota - interes;
    saldo -= capital;

    html += `<tr>
    <td>${k}</td>
    <td>${interes.toFixed(2)}</td>
    <td>${capital.toFixed(2)}</td>
    <td>${cuota.toFixed(2)}</td>
    <td>${saldo.toFixed(2)}</td>
    </tr>`;
}

html += "</table>";

document.getElementById("resultado").innerHTML = html;

}
</script>

<!-- 🔥 SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
</script>

<!-- 🔥 BOTÓN INSTALAR -->
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('instalarApp').style.display = 'block';
});

document.getElementById('instalarApp').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});
</script>

</body>
</html>
