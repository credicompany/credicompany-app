<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest-v2.json">
<meta name="theme-color" content="#0a3a63">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a3a63;
    text-align:center;
}

.logo{
    width:180px;
    margin-top:30px;
}

.card{
    background:#eaeaea;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:380px;
    margin:20px auto;
}

input, select, button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#28a745;
    color:white;
    font-weight:bold;
}

#instalar{
    background:#007bff;
    display:none;
}

.hidden{
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td{
    border:1px solid #ccc;
    padding:5px;
    font-size:12px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="card">
<h3>Credicompany</h3>

<button id="instalar" onclick="instalarApp()">📲 Instalar App</button>

<button onclick="mostrarLogin()">Ingresar</button>
</div>

<div id="login" class="card hidden">
<h3>Login Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="card hidden">
<h3>Simulador de Crédito</h3>

<select id="frecuencia">
<option>Diario</option>
<option selected>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="monto" placeholder="Monto" value="1000">
<input id="tasa" placeholder="Tasa %" value="21">
<input id="plazo" placeholder="Cuotas" value="8">

<button onclick="calcular()">Calcular</button>

<div id="resumen"></div>
<table id="tabla"></table>

</div>

<script>

// 🔥 SERVICE WORKER NUEVO
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw-v2.js?v=2");
}

// 🔥 INSTALACIÓN
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById("instalar").style.display = "block";
});

function instalarApp(){
if(deferredPrompt){
deferredPrompt.prompt();
}else{
alert("Espera unos segundos y vuelve a intentar");
}
}

// LOGIN
function mostrarLogin(){
document.getElementById("login").classList.remove("hidden");
}

function login(){
let u = document.getElementById("usuario").value;
let c = document.getElementById("clave").value;

if(u==="admin" && c==="1234"){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}else{
alert("Datos incorrectos");
}
}

// CALCULO
function calcular(){

let monto = parseFloat(document.getElementById("monto").value);
let tasa = parseFloat(document.getElementById("tasa").value)/100;
let n = parseInt(document.getElementById("plazo").value);

let cuota = monto * (tasa*Math.pow(1+tasa,n))/(Math.pow(1+tasa,n)-1);

let saldo = monto;
let totalInteres = 0;

let html = "<tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

for(let i=1;i<=n;i++){
let interes = saldo*tasa;
let capital = cuota - interes;
saldo -= capital;
totalInteres += interes;

html += `<tr>
<td>${i}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${cuota.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

document.getElementById("tabla").innerHTML = html;

document.getElementById("resumen").innerHTML = `
Cuota: ${cuota.toFixed(2)} <br>
Intereses: ${totalInteres.toFixed(2)} <br>
Total: ${(monto+totalInteres).toFixed(2)}
`;
}

</script>

</body>
</html>
