<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:90px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
}

th, td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<div id="app" style="display:none">

<div id="simulador" class="card">

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#999;">🔄 Nuevo</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar</button>
<button class="btn-azul" onclick="filtrar()">🔍 Filtrar</button>
</div>

<div id="cronograma"></div>

</div>

</div>

<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
</div>

<script>

let ultimaSimulacion={};

// LOGIN
function login(){
if(usuario.value=="admin" && clave.value=="1234"){
nombreAsesor.innerText=usuario.value;
loginDiv.style.display="none";
app.style.display="block";
}else{
alert("Datos incorrectos");
}
}

// LIMPIAR
function limpiar(){
cliente.value="";
apellidos.value="";
dni.value="";
monto.value="";
tasa.value="";
plazo.value="";
resultado.innerHTML="";
cronograma.innerHTML="";
}

// 🔥 CALCULAR CORREGIDO
function calcular(){

let nombre=cliente.value.trim();
let ape=apellidos.value.trim();
let doc=dni.value.trim();

let P=parseFloat(monto.value.replace(",","."));
let tasa=parseFloat(tasa.value.replace(",","."));
let n=parseInt(plazo.value);

if(!nombre || !ape || !doc){
alert("Completa datos del cliente");
return;
}

if(isNaN(P) || isNaN(tasa) || isNaN(n)){
alert("Monto, tasa y cuotas deben ser números");
return;
}

if(P<=0 || tasa<=0 || n<=0){
alert("Valores deben ser mayores a 0");
return;
}

let prod=producto.value;
let i=0;

if(prod=="semanal") i=(tasa/4)/100;
if(prod=="diario") i=(tasa/30)/100;
if(prod=="quincenal") i=(tasa/2)/100;
if(prod=="mensual") i=(tasa)/100;

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML=`Producto: ${prod.toUpperCase()}<br>Cuota: S/ ${cuota.toFixed(2)}`;

ultimaSimulacion={P,cuota,n,prod,i};

// CRONOGRAMA
let saldo=P;
let html="<table><tr><th>#</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Saldo</th></tr>";

for(let k=1;k<=Math.min(3,n);k++){
let interes=saldo*i;
let capital=cuota-interes;
saldo-=capital;

html+=`<tr>
<td>${k}</td>
<td>${cuota.toFixed(2)}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

html+="</table>";
cronograma.innerHTML=html;

}

// ENVIAR
function enviar(){
if(!ultimaSimulacion.P){
alert("Primero calcula");
return;
}
window.open("https://wa.me/?text="+encodeURIComponent("Simulación enviada"));
}

// FILTRAR
function filtrar(){
window.open("https://wa.me/?text="+encodeURIComponent("Cliente filtrado"));
}

</script>

</body>
</html>
