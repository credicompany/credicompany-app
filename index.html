<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>

body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:120px;
}

.header{
text-align:center;
padding:20px;
}

.header img{
width:180px;
}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

.volver{
background:#0a2f5c;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
cursor:pointer;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:20px;
border-radius:15px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.fila{
display:flex;
gap:10px;
margin-top:10px;
}

.fila button{
width:50%;
}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

/* PAGOS */
.pagos-container{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.pago-box{
background:white;
padding:15px;
border-radius:12px;
width:100%;
max-width:320px;
text-align:center;
}

.pago-box img{
width:100%;
height:auto;
object-fit:contain;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<h2>Credicompany</h2>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="semanal">Semanal</option>
<option value="diario">Diario</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviarSimulacion()">Enviar</button>
<button class="btn-azul" onclick="filtrar()">Filtro</button>
</div>

<h3>Control de pagos</h3>
<input id="pago" placeholder="Monto pagado">
<button class="btn-naranja" onclick="registrarPago()">Registrar pago</button>
<div id="estadoPago"></div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<h3>Clientes</h3>

<input id="c_nombre" placeholder="Nombre">
<input id="c_apellidos" placeholder="Apellidos">
<input id="c_dni" placeholder="DNI">

<button class="btn-verde" onclick="guardarCliente()">Guardar</button>

<div id="listaClientes"></div>
</div>

<!-- PAGOS SOLO VISUAL -->
<div id="pagos" class="card" style="display:none">

<div class="volver" onclick="volver()">← Volver</div>

<h3>💳 Medios de Pago</h3>

<div class="pagos-container">

<div class="pago-box">
<h4>BBVA</h4>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg">
</div>

<div class="pago-box">
<h4>BCP</h4>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg">
</div>

<div class="pago-box">
<h4>YAPE</h4>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg">
</div>

<div class="pago-box">
<h4>OTRO</h4>
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg">
</div>

</div>

</div>

</div>

<script>

let simData={};

document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
login();
}
});

function login(){
let u=usuario.value.trim();
let c=clave.value.trim();

if(u==="admin" && c==="1234"){
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario incorrecto");
}
}

function ocultarTodo(){
simulador.style.display="none";
clientes.style.display="none";
pagos.style.display="none";
}

function mostrar(p){
dashboard.style.display="none";
app.style.display="block";
ocultarTodo();
document.getElementById(p).style.display="block";
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

function calcular(){
let m=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);
let prod=producto.value;

if(isNaN(m)||isNaN(t)||isNaN(n)){
alert("Completa datos");
return;
}

let divisor=4;
if(prod==="diario") divisor=30;
if(prod==="semanal") divisor=4;
if(prod==="quincenal") divisor=2;
if(prod==="mensual") divisor=1;

let i=t/divisor;
let cuota=(m*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);

simData={nombre:cliente.value,ape:apellidos.value,dni:dni.value,cuota:cuota};
}

function enviarSimulacion(){
let d=simData;
if(!d){alert("Primero calcula");return;}

let msg=`Simulación:
${d.nombre} ${d.ape}
DNI: ${d.dni}
Cuota: S/ ${d.cuota.toFixed(2)}`;

window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}

function filtrar(){
window.open("https://wa.me/?text=Filtro cliente","_blank");
}

function registrarPago(){
let m=parseFloat(pago.value);
if(isNaN(m))return;
estadoPago.innerHTML="Pago: S/ "+m;
}

function guardarCliente(){
let lista=document.getElementById("listaClientes");
lista.innerHTML+=`<div class="item">${c_nombre.value} ${c_apellidos.value}</div>`;
}

</script>

</body>
</html>
