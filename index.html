<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
}

.header{text-align:center;padding:20px;}
.header img{width:150px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background: linear-gradient(135deg,#10c251,#0a9e44);
color:white;
font-weight:bold;
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:15px;
cursor:pointer;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
box-shadow:none;
}
</style>
</head>

<body>

<div class="header">
<h2>Credicompany</h2>
<p id="titulo">Crecemos juntos.</p>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa mensual (%)">
<input id="plazo" placeholder="Cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<button onclick="enviarPago()">📲 Enviar simulación</button>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<h3>💳 Medios de Pago</h3>

<h4>BBVA</h4>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg" onclick="enviarQR('BBVA')">

<h4>BCP</h4>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg" onclick="enviarQR('BCP')">

<h4>Yape</h4>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg" onclick="enviarQR('Yape')">

</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion={};

// LOGIN VALIDADO
function login(){
let u = usuario.value.trim();
let c = clave.value.trim();

if(u === "asesor1" && c === "1234"){
    loginDiv.style.display="none";
    app.style.display="block";
}else{
    alert("Usuario o clave incorrectos");
}
}

// CAMBIO DE PANTALLA
function mostrar(p){
simulador.style.display="none";
pagos.style.display="none";
document.getElementById(p).style.display="block";

titulo.innerText =
p === "simulador" ? "Simulación de crédito" : "Medios de pago";
}

// SIMULADOR PROFESIONAL
function calcular(){

let m=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

if(!m || !t || !n){
    resultado.innerHTML = "⚠ Complete todos los campos correctamente";
    return;
}

let i = t;

let cuota = m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);
let total = cuota * n;
let interes = total - m;

resultado.innerHTML = `
✅ Simulación correcta<br><br>
Cuota: <b>S/ ${cuota.toFixed(2)}</b><br>
Total a pagar: S/ ${total.toFixed(2)}<br>
Interés: S/ ${interes.toFixed(2)}
`;

ultimaSimulacion = {
monto:m,
cuota:cuota,
total:total,
interes:interes
};

// GUARDAR HISTORIAL
let historial = JSON.parse(localStorage.getItem("simulaciones")) || [];
historial.push(ultimaSimulacion);
localStorage.setItem("simulaciones", JSON.stringify(historial));

}

// ENVIAR SIMULACIÓN
function enviarPago(){

if(!ultimaSimulacion.monto){
alert("Primero realiza una simulación");
return;
}

let msg = `💳 *CREDICOMPANY*

Monto: S/ ${ultimaSimulacion.monto}
Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}
Total: S/ ${ultimaSimulacion.total.toFixed(2)}

Seleccione medio de pago`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// ENVIAR QR
function enviarQR(tipo){

let linkQR="";

if(tipo=="BBVA"){
linkQR="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg";
}

if(tipo=="BCP"){
linkQR="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg";
}

if(tipo=="Yape"){
linkQR="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg";
}

let mensaje = `💳 *CREDICOMPANY*

Pago vía ${tipo}

Escanea aquí:
${linkQR}

Enviar comprobante luego del pago`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));

}

</script>

</body>
</html>
