<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
}

.header{
text-align:center;
padding:20px;
}
.header img{
width:150px;
}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#10c251;
color:white;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:12px;
}

th{
background:#123B63;
color:white;
padding:6px;
}

td{
padding:5px;
text-align:center;
border-bottom:1px solid #ddd;
}

.card img{
width:100%;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
margin-bottom:10px;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<select id="frecuencia">
<option>Diario</option>
<option selected>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="N° cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>
<table id="tabla"></table>

<button onclick="enviarPago()">📲 Enviar simulación + pago</button>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<h3>💳 Pagos Credicompany</h3>

<h4>BBVA</h4>
<img src="bbva_qr.jpg">
<img src="bbva_datos.jpg">

<h4>BCP</h4>
<img src="bcp_datos.png">

<h4>Yape</h4>
<img src="yape_qr.jpg">

</div>

<!-- CARTERA -->
<div id="cartera" class="card" style="display:none">
<h3>Mi Cartera</h3>
<div id="lista"></div>
</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
<button onclick="mostrar('cartera')">Cartera</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5G2MyTkYZT0b7RMfLoBegcfAY4-ewdkc",
  authDomain: "credicompany-88693.firebaseapp.com",
  projectId: "credicompany-88693",
  storageBucket: "credicompany-88693.firebasestorage.app",
  messagingSenderId: "890359636696",
  appId: "1:890359636696:web:ed8b77c84bd85f5a212dad",
  measurementId: "G-KQTDXKKX37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.getDocs = getDocs;
window.collection = collection;
</script>

<script>

let usuarioActual="";
let ultimaSimulacion={};

// LOGIN
function login(){
let u = document.getElementById("usuario").value;
let c = document.getElementById("clave").value;

if(u && c){
usuarioActual = u;
document.getElementById("loginDiv").style.display="none";
document.getElementById("app").style.display="block";
cargarCartera();
}else{
alert("Ingrese datos");
}
}

// NAV
function mostrar(p){
document.getElementById("simulador").style.display="none";
document.getElementById("pagos").style.display="none";
document.getElementById("cartera").style.display="none";

if(p=="simulador") document.getElementById("simulador").style.display="block";
if(p=="pagos") document.getElementById("pagos").style.display="block";
if(p=="cartera"){
document.getElementById("cartera").style.display="block";
cargarCartera();
}
}

// ✅ SIMULADOR CORREGIDO
function calcular(){

let montoVal = parseFloat(document.getElementById("monto").value);
let tasaVal = parseFloat(document.getElementById("tasa").value)/100;
let plazoVal = parseInt(document.getElementById("plazo").value);

if(!montoVal || !tasaVal || !plazoVal){
alert("Completa todos los datos");
return;
}

let i = tasaVal / plazoVal;

let cuota = montoVal*(i*Math.pow(1+i,plazoVal))/(Math.pow(1+i,plazoVal)-1);

let saldo = montoVal;
let totalInteres=0;

let tablaHTML = "<tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

for(let k=1;k<=plazoVal;k++){
let interes = saldo*i;
let capital = cuota - interes;
saldo -= capital;

totalInteres += interes;

tablaHTML += `<tr>
<td>${k}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${cuota.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

document.getElementById("tabla").innerHTML = tablaHTML;

document.getElementById("resultado").innerHTML = `
Interés: S/ ${totalInteres.toFixed(2)}<br>
Total: S/ ${(cuota*plazoVal).toFixed(2)}<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

ultimaSimulacion={
monto:montoVal,
cuota:cuota
};

}

// WHATSAPP
function enviarPago(){

if(!ultimaSimulacion.monto){
alert("Primero simula");
return;
}

let mensaje = `💳 CREDICOMPANY

Monto: S/ ${ultimaSimulacion.monto}
Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}

Pagos:
BBVA / BCP / Yape

Enviar comprobante luego del pago.
Crecemos juntos`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));
}

// FIREBASE
async function cargarCartera(){

let contenedor = document.getElementById("lista");
contenedor.innerHTML="Cargando...";

try{
const snapshot = await getDocs(collection(window.db,"clientes"));

let html="";

snapshot.forEach(doc=>{
let d = doc.data();

if(d.asesor == usuarioActual){
html+=`
<div>
<b>${d.nombre}</b><br>
Estado: ${d.estado}<br>
Saldo: S/ ${d.saldo}
</div><hr>`;
}
});

contenedor.innerHTML = html || "Sin clientes";

}catch(e){
contenedor.innerHTML="Error cargando";
}
}

</script>

</body>
</html>
Compromiso y honradez, crecemos juntos...
