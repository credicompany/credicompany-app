<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">

<title>Credicompany</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:120px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

.volver{
background:#0a2f5c;
color:white;
padding:14px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
cursor:pointer;
}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:25px;
border-radius:15px;
text-align:center;
cursor:pointer;
}

.item{
padding:12px;
margin-top:10px;
border-radius:10px;
}

.filtros{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

/* PAGOS */
.pagos-container{
display:flex;
flex-direction:column;
gap:15px;
}

.pago-box{
background:white;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.pago-box img{
width:100%;
height:250px;
object-fit:contain;
}

/* MODAL QR */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
<div class="box" onclick="enviarUbicacion()">📍 Ubicación</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>
<div id="cronograma"></div>
</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input type="file" id="excelFile" accept=".xlsx">
<button class="btn-azul" onclick="cargarExcel()">📂 Cargar Excel</button>

<div class="filtros">
<button onclick="filtrar(0,8)" style="background:#2ecc71">0-8</button>
<button onclick="filtrar(9,30)" style="background:#f1c40f;color:black">9-30</button>
<button onclick="filtrar(31,60)" style="background:#e74c3c">31-60</button>
<button onclick="filtrar(61,1000)" style="background:black">61+</button>
</div>

<button class="btn-azul" onclick="renderClientes()">Ver todos</button>

<div id="listaClientes"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<div class="pagos-container">

<div class="pago-box" onclick="abrirQR(this)">
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image.jpg">
</div>

<div class="pago-box" onclick="abrirQR(this)">
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image.jpg">
</div>

<div class="pago-box" onclick="abrirQR(this)">
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image.jpg">
</div>

</div>

</div>

</div>

<!-- MODAL QR -->
<div id="modalQR" class="modal" onclick="cerrarQR()">
<img id="imgQR">
</div>

<script>

function login(){
if(usuario.value==="admin" && clave.value==="1234"){
nombreAsesor.innerText="admin";
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario incorrecto");
}
}

function mostrar(p){
dashboard.style.display="none";
app.style.display="block";

simulador.style.display="none";
clientes.style.display="none";
pagos.style.display="none";

document.getElementById(p).style.display="block";
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

function cargarExcel(){

let file=document.getElementById("excelFile").files[0];
if(!file)return alert("Selecciona archivo");

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);
let workbook=XLSX.read(data,{type:'array'});
let hoja=workbook.Sheets[workbook.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(hoja);

let limpio=json.map(r=>({

nombre: r["Nombre"] || "",
paterno: r["Apellido Paterno"] || "",
materno: r["Apellido Materno"] || "",

monto: r["Monto Otorgado"] || 0,
retraso: r["Dias Retraso"] || r["RETRASO"] || 0,

producto: r["Producto"] || "",
asesor: r["Asesor(a)"] || r["Asesor"] || "",

direccion: r["Direccion"] || "",
distrito: r["Distrito"] || ""

}));

localStorage.setItem("cartera",JSON.stringify(limpio));

renderClientes();

};

reader.readAsArrayBuffer(file);
}

function renderClientes(min=null,max=null){

let lista=document.getElementById("listaClientes");
lista.innerHTML="";

let data=JSON.parse(localStorage.getItem("cartera"))||[];

if(min!==null){
data=data.filter(c=>c.retraso>=min && c.retraso<=max);
}

data.forEach(c=>{

let dias=parseInt(c.retraso)||0;

let bg="#2ecc71";
let text="white";

if(dias<=8){bg="#2ecc71";}
else if(dias<=30){bg="#f1c40f";text="black";}
else if(dias<=60){bg="#e74c3c";}
else{bg="black";}

lista.innerHTML+=`
<div class="item" style="background:${bg};color:${text};font-weight:bold;">
👤 ${c.nombre} ${c.paterno} ${c.materno}<br>
💰 S/ ${c.monto}<br>
📊 ${c.producto}<br>
⏱ ${dias} días<br>
👨‍💼 ${c.asesor}<br>
📍 ${c.direccion} - ${c.distrito}
</div>
`;

});

}

function filtrar(a,b){
renderClientes(a,b);
}

/* QR */
function abrirQR(el){
imgQR.src=el.querySelector("img").src;
modalQR.style.display="flex";
}

function cerrarQR(){
modalQR.style.display="none";
}

function enviarUbicacion(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(pos){
let link=`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
window.open("https://wa.me/?text="+encodeURIComponent(link));
});
}
}

</script>

</body>
</html>
