<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Credicompany</title>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;padding-bottom:120px;}

.header{display:flex;flex-direction:column;align-items:center;padding:20px;}
.header img{width:180px;}

.card{background:#f2f2f2;color:#333;margin:15px;padding:20px;border-radius:15px;}
h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-rojo{background:#e74c3c;}
.btn-naranja{background:#ff9800;}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

.card img{
width:100%;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
font-size:12px;
}

th, td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
font-weight:bold;
}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

.estado{
margin-top:10px;
padding:10px;
border-radius:10px;
font-weight:bold;
text-align:center;
}

.ok{background:#10c251;color:white;}
.warn{background:#ff9800;color:white;}
.bad{background:#e74c3c;color:white;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI / Buscar cliente">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal" selected>Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Número de cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#999;margin-top:5px;">🔄 Nuevo</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar simulación</button>
<button class="btn-azul" onclick="filtrar()">📤 Enviar Filtro</button>
</div>

<div id="cronograma"></div>

<!-- CONTROL DE PAGOS -->
<h3>Control de pagos</h3>
<input id="pago" placeholder="Monto pagado">
<button class="btn-naranja" onclick="registrarPago()">💰 Registrar pago</button>
<div id="estadoPago"></div>

</div>

<!-- HISTORIAL -->
<div id="historial" class="card" style="display:none">
<h3>Historial de Clientes</h3>
<div id="listaClientes"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<h3>💳 Medios de Pago</h3>

<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg" onclick="enviarQR('Principal')">
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg" onclick="enviarQR('BBVA')">
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg" onclick="enviarQR('BCP')">
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg" onclick="enviarQR('Yape')">

</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('historial')">Historial</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion={};

function login(){
let u=usuario.value.trim().toLowerCase();
let c=clave.value.trim();

if(u==="admin" && c==="1234"){
nombreAsesor.innerText=u;
loginDiv.style.display="none";
app.style.display="block";
}else{
alert("Usuario o clave incorrectos");
}
}

function mostrar(p){
simulador.style.display="none";
historial.style.display="none";
pagos.style.display="none";
document.getElementById(p).style.display="block";
if(p==="historial") renderHistorial();
}

function limpiar(){
["cliente","apellidos","dni","monto","tasa","plazo","pago"].forEach(id=>{
document.getElementById(id).value="";
});
resultado.innerHTML="";
cronograma.innerHTML="";
estadoPago.innerHTML="";
}

// CALCULAR
function calcular(){

let nombre=cliente.value.trim();
let ape=apellidos.value.trim();
let doc=dni.value.trim();

let P=parseFloat(monto.value);
let tasaVal=parseFloat(tasa.value);
let n=parseInt(plazo.value);
let prod=producto.value;

if(!nombre||!ape||!doc){ alert("Completa datos"); return; }

let i=0;
if(prod==="semanal") i=(tasaVal/4)/100;
if(prod==="diario") i=(tasaVal/30)/100;
if(prod==="quincenal") i=(tasaVal/2)/100;
if(prod==="mensual") i=(tasaVal)/100;

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML=`Producto: ${prod.toUpperCase()}<br>Cuota: S/ ${cuota.toFixed(2)}`;

ultimaSimulacion={P,cuota,n,prod,nombre,ape,doc};

// guardar cliente
let clientes=JSON.parse(localStorage.getItem("clientes")||"[]");
if(!clientes.find(x=>x.dni===doc)){
clientes.push({nombre,apellidos:ape,dni:doc});
localStorage.setItem("clientes",JSON.stringify(clientes));
}

// inicializar deuda
localStorage.setItem("deuda_"+doc,JSON.stringify({
total:cuota*n,
pagado:0
}));

// cronograma
let saldo=P;
let html="<table><tr><th>#</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Saldo</th></tr>";

for(let k=1;k<=Math.min(3,n);k++){
let interes=saldo*i;
let capital=cuota-interes;
saldo-=capital;

html+=`<tr>
<td>${k}</td>
<td>${cuota.toFixed(2)}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

cronograma.innerHTML=html+"</table>";
}

// REGISTRAR PAGO
function registrarPago(){

let doc=dni.value;
let data=JSON.parse(localStorage.getItem("deuda_"+doc));

if(!data){ alert("Primero simula"); return; }

let pagoVal=parseFloat(pago.value);
if(isNaN(pagoVal)){ alert("Ingresa monto válido"); return; }

data.pagado += pagoVal;

localStorage.setItem("deuda_"+doc,JSON.stringify(data));

let saldo=data.total - data.pagado;

let estado="";

if(saldo<=0){
estado=`<div class="estado ok">CANCELADO ✔</div>`;
}else if(data.pagado>0){
estado=`<div class="estado warn">PENDIENTE ⚠️<br>Saldo: S/ ${saldo.toFixed(2)}</div>`;
}else{
estado=`<div class="estado bad">SIN PAGOS ❌</div>`;
}

estadoPago.innerHTML=estado;
}

// ENVIAR
function enviar(){
let d=ultimaSimulacion;
if(!d.P){ alert("Primero calcula"); return; }

let msg=`Cliente: ${d.nombre} ${d.ape}
DNI: ${d.doc}
Cuota: S/ ${d.cuota.toFixed(2)}`;

location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

// FILTRAR
function filtrar(){

let texto=dni.value.toLowerCase();
let data=JSON.parse(localStorage.getItem("clientes")||"[]");

let c=data.find(x=>
(x.dni+"").includes(texto)||
(x.nombre+"").toLowerCase().includes(texto)
);

if(!c){ alert("No encontrado"); return; }

cliente.value=c.nombre;
apellidos.value=c.apellidos;

let msg=`${c.nombre} ${c.apellidos}
DNI: ${c.dni}`;

location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

// HISTORIAL
function renderHistorial(){
let lista=document.getElementById("listaClientes");
let data=JSON.parse(localStorage.getItem("clientes")||"[]");

lista.innerHTML="";

data.forEach((c,i)=>{
lista.innerHTML+=`
<div class="item">
<b>${c.nombre} ${c.apellidos}</b><br>DNI: ${c.dni}
<div class="fila">
<button class="btn-verde" onclick="cargar(${i})">Usar</button>
<button class="btn-rojo" onclick="eliminar(${i})">Eliminar</button>
</div>
</div>`;
});
}

function cargar(i){
let data=JSON.parse(localStorage.getItem("clientes")||"[]");
let c=data[i];

cliente.value=c.nombre;
apellidos.value=c.apellidos;
dni.value=c.dni;

mostrar('simulador');
}

function eliminar(i){
let data=JSON.parse(localStorage.getItem("clientes")||"[]");
data.splice(i,1);
localStorage.setItem("clientes",JSON.stringify(data));
renderHistorial();
}

// QR
function enviarQR(tipo){
location.href="https://wa.me/?text=Pago "+tipo;
}

</script>

</body>
</html>
