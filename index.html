<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:#0a2f5c;
color:white;
}

.container{
padding:20px;
}

.card{
background:white;
color:#1a1a1a;
border-radius:20px;
padding:20px;
margin:15px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
background:#f1f3f6;
font-size:16px;
}

button{
width:100%;
padding:15px;
border-radius:12px;
border:none;
background:#00c853;
color:white;
font-size:16px;
font-weight:bold;
}

.item{
background:#f9f9f9;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2 style="text-align:left;">Hola 👋</h2>
<p style="text-align:left;">Bienvenido a Credicompany</p>

<!-- LOGIN -->
<div id="login" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- SIMULADOR -->
<div class="card">
<h3>Simulador de Crédito</h3>

<select id="frecuencia">
<option>Diario</option>
<option selected>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa %" value="21">
<input id="plazo" placeholder="Cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resumen"></div>
</div>

<!-- REGISTRO -->
<div class="card">
<h3>Registrar Cliente</h3>

<input id="dni" placeholder="DNI">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<button onclick="guardarCliente()">Guardar Cliente</button>
</div>

<!-- LISTA -->
<div class="card">
<h3>Clientes</h3>
<div id="lista"></div>
</div>

</div>

</div>

<script>

// USUARIOS
const usuarios = [
{user:"admin",pass:"1234"},
{user:"asesor1",pass:"1234"}
];

let asesorActivo="";

// LOGIN
function login(){
let u=usuario.value;
let c=clave.value;

let ok=usuarios.find(x=>x.user===u && x.pass===c);

if(ok){
asesorActivo=u;
loginDiv.classList.add("hidden");
appDiv.classList.remove("hidden");
mostrarClientes();
}else{
alert("Datos incorrectos");
}
}

// SIMULADOR
let ultimaSimulacion={};

function calcular(){

let m=parseFloat(montoInput.value);
let TEM=parseFloat(tasaInput.value)/100;
let n=parseInt(plazoInput.value);
let f=frecuencia.value;

let i;

if(f==="Diario") i=Math.pow(1+TEM,1/30)-1;
if(f==="Semanal") i=Math.pow(1+TEM,1/4)-1;
if(f==="Quincenal") i=Math.pow(1+TEM,1/2)-1;
if(f==="Mensual") i=TEM;

let cuota=m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

let total=cuota*n;

resumen.innerHTML=`
<br><b>Cuota:</b> S/ ${cuota.toFixed(2)}<br>
<b>Total:</b> S/ ${total.toFixed(2)}
`;

ultimaSimulacion={
monto:m,
cuota:cuota.toFixed(2),
total:total.toFixed(2)
};
}

// GUARDAR CLIENTE
function guardarCliente(){

if(!ultimaSimulacion.monto){
alert("Primero calcula el crédito");
return;
}

let cliente={
dni:dni.value,
nombre:nombre.value,
telefono:telefono.value,
monto:ultimaSimulacion.monto,
cuota:ultimaSimulacion.cuota,
total:ultimaSimulacion.total,
asesor:asesorActivo
};

let data=JSON.parse(localStorage.getItem("clientes"))||[];

data.push(cliente);

localStorage.setItem("clientes",JSON.stringify(data));

alert("Cliente guardado");

mostrarClientes();
}

// MOSTRAR CLIENTES
function mostrarClientes(){

let data=JSON.parse(localStorage.getItem("clientes"))||[];

let filtro=data.filter(x=>x.asesor===asesorActivo);

let html="";

filtro.forEach(c=>{
html+=`
<div class="item">
<b>${c.nombre}</b><br>
Monto: S/ ${c.monto}<br>
Cuota: S/ ${c.cuota}
</div>`;
});

lista.innerHTML=html;
}

// REFERENCIAS
const loginDiv=document.getElementById("login");
const appDiv=document.getElementById("app");

const usuario=document.getElementById("usuario");
const clave=document.getElementById("clave");

const montoInput=document.getElementById("monto");
const tasaInput=document.getElementById("tasa");
const plazoInput=document.getElementById("plazo");
const frecuencia=document.getElementById("frecuencia");
const resumen=document.getElementById("resumen");

const dni=document.getElementById("dni");
const nombre=document.getElementById("nombre");
const telefono=document.getElementById("telefono");
const lista=document.getElementById("lista");

</script>

</body>
</html>
