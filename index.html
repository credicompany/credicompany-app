<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#123B63;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px 15px 10px;
}

.header h2{
  margin:0;
  font-size:22px;
  letter-spacing:1px;
}

/* CARD PRINCIPAL */
.card{
  background:#ffffff;
  color:#333;
  margin:20px;
  padding:25px 20px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

/* TITULOS */
.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:8px;
  color:#123B63;
}

.subtitle{
  font-size:14px;
  color:#777;
  margin-bottom:18px;
}

/* QR */
.qr-section{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:15px;
}

.qr-section img{
  width:230px;
  height:230px;
  object-fit:cover;
  border-radius:14px;
  background:#fff;
  padding:8px;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  cursor:pointer;
  transition:0.3s;
}

.qr-section img:hover{
  transform:scale(1.05);
}

/* BOTÓN */
.btn{
  margin-top:10px;
  background:#123B63;
  color:white;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:15px;
  width:100%;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.btn:active{
  transform:scale(0.97);
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  margin-top:10px;
  opacity:0.7;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal img{
  width:90%;
  max-width:400px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
  <h2>CREDICOMPANY</h2>
</div>

<div class="card">
  <div class="title">Pago con QR</div>
  <div class="subtitle">Escanea y paga con cualquier billetera</div>

  <div class="qr-section">
    <img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg" onclick="verQR()">
  </div>

  <button class="btn" onclick="pago()">Ya realicé el pago</button>
</div>

<div class="footer">
  © 2026 Credicompany
</div>

<div id="modal" class="modal">
  <img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg">
</div>

<script>
function pago(){
  alert("Pago registrado. Validando...");
}

function verQR(){
  document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick = function(){
  this.style.display="none";
}
</script>

</body>
</html>
