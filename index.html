<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache">

<title>Credicompany</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;padding-bottom:120px;}
.header{display:flex;flex-direction:column;align-items:center;padding:20px;}
.header img{width:180px;}
.card{background:#f2f2f2;color:#333;margin:15px;padding:20px;border-radius:15px;}
.volver{position:sticky;top:0;background:#0a2f5c;color:white;padding:14px;border-radius:12px;text-align:center;font-weight:bold;margin-bottom:15px;cursor:pointer;}
input, select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;}
button{padding:14px;border:none;border-radius:12px;color:white;font-weight:bold;width:100%;}
.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px;}
.box{background:white;color:#123B63;padding:25px;border-radius:15px;text-align:center;font-weight:bold;cursor:pointer;}
.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}
.item{background:white;padding:12px;margin-top:10px;border-radius:10px;color:#333;}
.pagos-container{display:flex;flex-direction:column;gap:20px;}
.pago-box{background:white;padding:10px;border-radius:12px;cursor:pointer;}
.pago-box img{width:100%;height:260px;object-fit:contain;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;z-index:999;}
.modal img{width:95%;max-width:450px;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
<div class="box" onclick="enviarUbicacion()">📍 Ubicación</div>
<div class="box" onclick="mostrar('admin')">⚙️ Usuarios</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>
<div id="cronograma"></div>

<div class="fila">
<button class="btn-verde" onclick="enviarSimulacion()">Simulación</button>
<button class="btn-azul" onclick="enviarFiltro()">Filtro</button>
</div>

<button class="btn-naranja" onclick="limpiar()">Limpiar</button>
</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input id="c_nombre" placeholder="Nombre">
<input id="c_apellidos" placeholder="Apellidos">
<input id="c_dni" placeholder="DNI">
<input id="c_monto" placeholder="Monto">

<button class="btn-verde" onclick="guardarCliente()">Guardar</button>

<input type="file" id="excelFile" accept=".csv,.xlsx" style="margin-top:15px;">
<button class="btn-azul" onclick="cargarExcel()">📂 Cargar Excel</button>

<div class="fila">
<button style="background:#2ecc71" onclick="filtrarMora(0,8)">0-8</button>
<button style="background:#f1c40f;color:black" onclick="filtrarMora(9,30)">9-30</button>
</div>

<div class="fila">
<button style="background:#e74c3c" onclick="filtrarMora(31,60)">31-60</button>
<button style="background:black" onclick="filtrarMora(61,1000)">61+</button>
</div>

<button class="btn-azul" onclick="renderClientes()">Ver todos</button>

<div id="listaClientes"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input id="nuevoUser" placeholder="Usuario">
<input id="nuevoPass" placeholder="Clave">

<button class="btn-verde" onclick="crearUsuario()">Crear Usuario</button>

<div id="listaUsuarios"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<div class="pagos-container">
<div class="pago-box" onclick="abrirQR(this)">
<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image.jpg">
</div>
<div class="pago-box" onclick="abrirQR(this)">
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image.jpg">
</div>
<div class="pago-box" onclick="abrirQR(this)">
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image.jpg">
</div>
</div>
</div>

</div>

<!-- MODAL -->
<div id="modalQR" class="modal" onclick="cerrarQR()">
<img id="imgQR">
</div>

<script>

let asesor="";

// LOGIN
function login(){
let user=usuario.value;
let pass=clave.value;

if(user==="admin" && pass==="1234"){
asesor=user;
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
dashboard.style.display="block";
return;
}

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

let encontrado=usuarios.find(u=>u.user===user && u.pass===pass);

if(encontrado){
asesor=user;
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario incorrecto");
}
}

// MOSTRAR
function mostrar(p){
dashboard.style.display="none";
app.style.display="block";

["simulador","clientes","pagos","admin"].forEach(id=>{
document.getElementById(id).style.display="none";
});

document.getElementById(p).style.display="block";

if(p==="admin") setTimeout(renderUsuarios,100);
if(p==="clientes") renderClientes();
}

// VOLVER
function volver(){
app.style.display="none";
dashboard.style.display="block";
}

// USUARIOS
function crearUsuario(){
let user=nuevoUser.value.trim();
let pass=nuevoPass.value.trim();

if(!user||!pass)return alert("Completa datos");

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

if(usuarios.find(u=>u.user===user)) return alert("Usuario existe");

usuarios.push({user,pass});
localStorage.setItem("usuarios",JSON.stringify(usuarios));

nuevoUser.value="";
nuevoPass.value="";

renderUsuarios();
}

function renderUsuarios(){
let lista=listaUsuarios;
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

lista.innerHTML="";

if(!usuarios.length){
lista.innerHTML="<div class='item'>No hay usuarios</div>";
return;
}

usuarios.forEach((u,i)=>{
lista.innerHTML+=`
<div class="item">
👤 ${u.user}
<button onclick="eliminarUsuario(${i})" style="background:red;margin-top:5px">Eliminar</button>
</div>`;
});
}

function eliminarUsuario(i){
if(!confirm("Eliminar usuario?"))return;

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];
usuarios.splice(i,1);

localStorage.setItem("usuarios",JSON.stringify(usuarios));
renderUsuarios();
}

// SIMULADOR
function calcular(){
let P=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

let i={diario:t/30,semanal:t/4,quincenal:t/2,mensual:t}[producto.value];
let dias={diario:1,semanal:7,quincenal:15,mensual:30}[producto.value];

let cuota=(P*i)/(1-Math.pow(1+i,-n));
resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);

let saldo=P,fecha=new Date(),html="";
for(let c=1;c<=n;c++){
saldo-=cuota-(saldo*i);
fecha.setDate(fecha.getDate()+dias);
html+=`<div class="item">Cuota ${c} - ${fecha.toLocaleDateString()}</div>`;
}
cronograma.innerHTML=html;

window.simData={monto:P,cuota:cuota.toFixed(2),producto:producto.value};
}

function limpiar(){
document.querySelectorAll("input").forEach(i=>i.value="");
resultado.innerHTML="";
cronograma.innerHTML="";
}

// WHATSAPP
function enviarSimulacion(){
window.open("https://wa.me/?text="+encodeURIComponent(
`Monto: ${simData.monto}\nCuota: ${simData.cuota}\nProducto: ${simData.producto}`));
}

function enviarFiltro(){
window.open("https://wa.me/?text="+encodeURIComponent(
`${cliente.value} ${apellidos.value}\nDNI:${dni.value}`));
}

// EXCEL
function cargarExcel(){
let file=excelFile.files[0];
if(!file)return alert("Selecciona archivo");

let reader=new FileReader();
reader.onload=e=>{
let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:'array'});
let json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
localStorage.setItem("cartera",JSON.stringify(json));
renderClientes();
};
reader.readAsArrayBuffer(file);
}

// CLIENTES
function renderClientes(){
let data=JSON.parse(localStorage.getItem("cartera"))||[];
listaClientes.innerHTML="";

data.forEach(c=>{
listaClientes.innerHTML+=`
<div class="item">
<b>${c.Nombre||""}</b><br>
Monto: ${c["Monto Otorgado"]||0}<br>
Retraso: ${c.RETRASO||0}
</div>`;
});
}

function filtrarMora(min,max){
let data=JSON.parse(localStorage.getItem("cartera"))||[];
listaClientes.innerHTML="";

data.filter(c=>(c.RETRASO||0)>=min&&(c.RETRASO||0)<=max)
.forEach(c=>{
listaClientes.innerHTML+=`<div class="item">${c.Nombre}</div>`;
});
}

function guardarCliente(){}

// QR
function abrirQR(el){imgQR.src=el.querySelector("img").src;modalQR.style.display="flex";}
function cerrarQR(){modalQR.style.display="none";}

// GPS
function enviarUbicacion(){
navigator.geolocation.getCurrentPosition(p=>{
window.open("https://wa.me/?text="+
encodeURIComponent(`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`));
});
}

</script>

</body>
</html>
