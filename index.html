<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a3a63">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a3a63;
}

.container{
    text-align:center;
    padding:20px;
}

.logo{
    width:180px;
    margin-bottom:10px;
}

.card{
    background:#eaeaea;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    margin:auto;
}

input,select,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#28a745;
    color:white;
    font-weight:bold;
}

#instalar{
    background:#007bff;
    display:none;
}

.hidden{
    display:none;
}

table{
    width:100%;
    margin-top:10px;
    font-size:12px;
    border-collapse:collapse;
}

th{
    background:#0a3a63;
    color:white;
}

th,td{
    border:1px solid #ccc;
    padding:5px;
}

.resumen{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<!-- LOGIN -->
<div id="login" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">

<h3>Simulador de Crédito</h3>

<input id="cliente" placeholder="Nombre cliente">

<select id="tipo">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input type="number" id="monto" placeholder="Monto">
<input type="number" id="tasa" placeholder="Tasa %">
<input type="number" id="plazo" placeholder="Plazo">

<button onclick="simular()">Calcular</button>
<button onclick="guardar()">Guardar</button>

<button id="instalar" onclick="instalarApp()">📲 Instalar App</button>

<div id="resumen" class="resumen"></div>
<div id="resultado"></div>

</div>

<div class="card">
<h3>Historial</h3>
<div id="historial"></div>
</div>

</div>

</div>

<script>

// 🔐 USUARIOS
const usuarios = [
{user:"admin", pass:"1234"},
{user:"asesor1", pass:"1234"},
{user:"asesor2", pass:"1234"}
];

let usuarioActivo = "";

// LOGIN
function login(){
let u = document.getElementById("usuario").value;
let c = document.getElementById("clave").value;

let valido = usuarios.find(x => x.user === u && x.pass === c);

if(valido){
usuarioActivo = u;

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

cargarHistorial();

}else{
alert("Usuario o clave incorrecta");
}
}

// SIMULADOR
let ultima = {};

function simular(){

let monto = Number(document.getElementById("monto").value);
let tasaBase = Number(document.getElementById("tasa").value)/100;
let plazo = Number(document.getElementById("plazo").value);
let tipo = document.getElementById("tipo").value;

if(!monto || !tasaBase || !plazo){
alert("Completa datos");
return;
}

let tasa;
switch(tipo){
case "diario": tasa = tasaBase/30; break;
case "semanal": tasa = tasaBase/4; break;
case "quincenal": tasa = tasaBase/2; break;
case "mensual": tasa = tasaBase; break;
}

let i = tasa;
let n = plazo;

let cuota = monto * (i * Math.pow(1+i,n)) / (Math.pow(1+i,n)-1);

let saldo = monto;
let totalInteres = 0;

let html = "<table><tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

for(let k=1;k<=n;k++){
let interes = saldo*i;
let capital = cuota - interes;

totalInteres += interes;
saldo -= capital;

html += `<tr>
<td>${k}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${cuota.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

html += "</table>";

document.getElementById("resultado").innerHTML = html;

let totalPagar = cuota * n;

document.getElementById("resumen").innerHTML = `
Cuota: S/ ${cuota.toFixed(2)} <br>
Intereses: S/ ${totalInteres.toFixed(2)} <br>
Total: S/ ${totalPagar.toFixed(2)}
`;

ultima = {
cliente: document.getElementById("cliente").value,
cuota: cuota.toFixed(2),
total: totalPagar.toFixed(2),
usuario: usuarioActivo
};

}

// GUARDAR
function guardar(){
let data = JSON.parse(localStorage.getItem("creditos")) || [];
data.push(ultima);
localStorage.setItem("creditos", JSON.stringify(data));
alert("Guardado");
cargarHistorial();
}

// HISTORIAL
function cargarHistorial(){
let data = JSON.parse(localStorage.getItem("creditos")) || [];
let filtrado = data.filter(x => x.usuario === usuarioActivo);

let html = "";

filtrado.forEach(d=>{
html += `
<div style="border-bottom:1px solid #ccc;padding:5px">
<b>${d.cliente}</b><br>
Cuota: ${d.cuota}<br>
Total: ${d.total}
</div>`;
});

document.getElementById("historial").innerHTML = html;
}

// 🔥 SERVICE WORKER
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js?v=10");
}

// 🔥 INSTALAR APP
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
e.preventDefault();
deferredPrompt = e;
document.getElementById("instalar").style.display = "block";
});

function instalarApp(){
if(deferredPrompt){
deferredPrompt.prompt();
}
}

</script>

</body>
</html>
