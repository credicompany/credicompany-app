<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
}

.header{text-align:center;padding:20px;}
.header img{width:150px;}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#10c251;
color:white;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:12px;
}

th{background:#123B63;color:white;padding:6px;}
td{padding:5px;text-align:center;border-bottom:1px solid #ddd;}

.card img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}

.menu button{
background:none;
color:#123B63;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<h3>Simulador</h3>

<select id="frecuencia">
<option>Diario</option>
<option selected>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="N° cuotas">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>
<table id="tabla"></table>

<button onclick="enviarPago()">📲 Enviar por WhatsApp</button>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<h3>💳 Pagos</h3>

<h4>BBVA</h4>
<img src="bbva_qr.jpg">
<img src="bbva_datos.jpg">

<h4>BCP</h4>
<img src="bcp_datos.png">

<h4>Yape</h4>
<img src="yape_qr.jpg">
</div>

</div>

<!-- MENU -->
<div class="menu">
<button onclick="mostrar('simulador')">Simular</button>
<button onclick="mostrar('pagos')">Pagos</button>
</div>

<script>

let ultimaSimulacion={};

// LOGIN SIMPLE
function login(){
let u = usuario.value;
let c = clave.value;

if(u && c){
loginDiv.style.display="none";
app.style.display="block";
}else{
alert("Ingrese datos");
}
}

// NAV
function mostrar(p){
simulador.style.display="none";
pagos.style.display="none";
document.getElementById(p).style.display="block";
}

// SIMULADOR
function calcular(){

let m = parseFloat(monto.value);
let t = parseFloat(tasa.value)/100;
let n = parseInt(plazo.value);
let f = frecuencia.value;

if(!m || !t || !n){
alert("Completa datos");
return;
}

let i;

if(f=="Diario") i = Math.pow(1+t,1/30)-1;
if(f=="Semanal") i = Math.pow(1+t,1/4)-1;
if(f=="Quincenal") i = Math.pow(1+t,1/2)-1;
if(f=="Mensual") i = t;

let cuota = m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

let saldo=m;
let totalInteres=0;

let html="<tr><th>#</th><th>Interés</th><th>Capital</th><th>Cuota</th><th>Saldo</th></tr>";

for(let k=1;k<=n;k++){
let interes=saldo*i;
let capital=cuota-interes;
saldo-=capital;
totalInteres+=interes;

html+=`<tr>
<td>${k}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${cuota.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}

tabla.innerHTML=html;

resultado.innerHTML=`
Interés: S/ ${totalInteres.toFixed(2)}<br>
Total: S/ ${(cuota*n).toFixed(2)}<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

ultimaSimulacion={
monto:m,
cuota:cuota,
plazo:n
};

}

// 🔥 WHATSAPP PRO
function enviarPago(){

if(!ultimaSimulacion.monto){
alert("Primero simula");
return;
}

let mensaje = `💳 *CREDICOMPANY*

📌 Simulación aprobada:

💰 Monto: S/ ${ultimaSimulacion.monto}
💵 Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}
📆 Plazo: ${ultimaSimulacion.plazo} cuotas

💳 *MEDIOS DE PAGO:*

🏦 BBVA / BCP  
📲 Yape  

📸 Adjunta tu comprobante luego del pago.

*Crecemos juntos*`;

window.open("https://wa.me/?text="+encodeURIComponent(mensaje));

}

</script>

</body>
</html>
