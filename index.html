<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Créditos - Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a3a63;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    text-align: center;
}
.logo {
    width: 180px;
    margin-bottom: 20px;
}
.card {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 340px;
}
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}
table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
    font-size: 12px;
}
th, td {
    border: 1px solid #ccc;
    padding: 5px;
    text-align: center;
}
th {
    background: #eee;
}
</style>
</head>

<body>

<div class="container">

<img src="LOGO-FONDO-AZUL.png" class="logo">

<div class="card">
<h2>Simulador de Crédito</h2>

<label>Tipo de crédito</label>
<select id="tipo">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<label>Monto (S/)</label>
<input type="number" id="monto">

<label>Tasa (%)</label>
<input type="number" id="tasa">

<label>Plazo</label>
<input type="number" id="plazo">

<button onclick="simular()">Calcular</button>

<div id="resultado"></div>

</div>
</div>

<script>

function simular() {

let monto = parseFloat(document.getElementById("monto").value);
let tasaBase = parseFloat(document.getElementById("tasa").value) / 100;
let plazo = parseInt(document.getElementById("plazo").value);
let tipo = document.getElementById("tipo").value;

// 🔥 Ajuste de tasa según frecuencia
let tasa;

switch(tipo) {
    case "diario":
        tasa = tasaBase / 30;
        break;
    case "semanal":
        tasa = tasaBase / 4;
        break;
    case "quincenal":
        tasa = tasaBase / 2;
        break;
    case "mensual":
        tasa = tasaBase;
        break;
}

// 🔥 SISTEMA FRANCÉS (CUOTA FIJA)
let i = tasa;
let n = plazo;

let cuota = monto * (i * Math.pow(1 + i, n)) / (Math.pow(1 + i, n) - 1);

let saldo = monto;

// 🔥 TABLA PROFESIONAL
let html = `
<table>
<tr>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Cuota</th>
<th>Saldo</th>
</tr>
`;

for (let k = 1; k <= n; k++) {

    let interes = saldo * i;
    let capital = cuota - interes;

    saldo -= capital;

    html += `
    <tr>
    <td>${k}</td>
    <td>${interes.toFixed(2)}</td>
    <td>${capital.toFixed(2)}</td>
    <td>${cuota.toFixed(2)}</td>
    <td>${saldo.toFixed(2)}</td>
    </tr>
    `;
}

html += `</table>`;

document.getElementById("resultado").innerHTML = html;

}

// Service Worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
