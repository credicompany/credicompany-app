<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a3a63">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a3a63;
    text-align:center;
}

.logo{
    width:180px;
    margin-top:40px;
}

.card{
    background:#eaeaea;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    margin:20px auto;
}

input,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#28a745;
    color:white;
    font-weight:bold;
}

#instalar{
    background:#007bff;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<!-- INSTALAR PRIMERO -->
<div class="card">
<h3>Bienvenido a Credicompany</h3>

<button id="instalar" onclick="instalarApp()">📲 Instalar App</button>

<button onclick="mostrarLogin()">Ingresar</button>
</div>

<!-- LOGIN -->
<div id="login" class="card hidden">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button onclick="login()">Entrar</button>
</div>

<script>

// SERVICE WORKER
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js?v=20");
}

// INSTALACIÓN
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
e.preventDefault();
deferredPrompt = e;
});

function instalarApp(){
if(deferredPrompt){
deferredPrompt.prompt();
}else{
alert("Usa Chrome y espera unos segundos");
}
}

// MOSTRAR LOGIN
function mostrarLogin(){
document.getElementById("login").classList.remove("hidden");
}

// LOGIN SIMPLE
function login(){

let u = document.getElementById("usuario").value;
let c = document.getElementById("clave").value;

if(u==="admin" && c==="1234"){
alert("Ingreso correcto");
}else{
alert("Datos incorrectos");
}

}
</script>

</body>
</html>
