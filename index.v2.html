<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache">

<title>Credicompany</title>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;padding-bottom:120px;}

.header{display:flex;flex-direction:column;align-items:center;padding:20px;}
.header img{width:180px;}

.card{background:#f2f2f2;color:#333;margin:15px;padding:20px;border-radius:15px;}
h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:25px;
border-radius:15px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.fila{display:flex;gap:10px;margin-top:10px;}
.fila button{width:50%;}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

.estado{padding:6px;border-radius:6px;color:white;font-size:12px;display:inline-block;margin-top:5px;}
.ok{background:#10c251;}
.alerta{background:#ff9800;}
.mora{background:#e74c3c;}

.volver{
margin-bottom:10px;
background:#123B63;
color:white;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
<div class="box" onclick="ubicacion()">📍 Ubicación</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">

<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal" selected>Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar simulación</button>
<button class="btn-azul" onclick="filtrar()">📤 Enviar Filtro</button>
</div>

<h3>Control de pagos</h3>
<input id="pago" placeholder="Monto pagado">
<button class="btn-naranja" onclick="registrarPago()">💰 Registrar pago</button>
<div id="estadoPago"></div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">

<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>Cartera de Clientes</h3>

<input id="c_nombre" placeholder="Nombre">
<input id="c_apellidos" placeholder="Apellidos">
<input id="c_dni" placeholder="DNI">
<input id="c_monto" placeholder="Monto desembolsado">

<select id="c_producto">
<option>Diario</option>
<option>Semanal</option>
<option>Quincenal</option>
<option>Mensual</option>
</select>

<input id="c_fecha" type="date">

<button class="btn-verde" onclick="guardarCliente()">Guardar Cliente</button>

<div id="listaClientes"></div>

</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<div class="volver" onclick="volver()">← Volver al inicio</div>

<h3>💳 Medios de Pago</h3>

<img src="https://i.postimg.cc/qBYdz46B/Whats-App-Image-2026-04-02-at-12-36-51-PM.jpg">
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg">
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg">

</div>

</div>

<script>

let asesor="";

// LOGIN
function login(){
let u=usuario.value.trim().toLowerCase();
let c=clave.value.trim();

if(u==="admin" && c==="1234"){
asesor=u;
nombreAsesor.innerText=asesor;
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario o clave incorrectos");
}
}

// NAVEGACIÓN
function mostrar(p){
dashboard.style.display="none";
app.style.display="block";

simulador.style.display="none";
clientes.style.display="none";
pagos.style.display="none";

document.getElementById(p).style.display="block";

if(p==="clientes") renderClientes();
}

// VOLVER
function volver(){
app.style.display="none";
dashboard.style.display="block";
}

// BLOQUEO BOTÓN ATRÁS (ANTI SALIDA)
history.pushState(null, null, location.href);

window.onpopstate = function () {
volver();
history.pushState(null, null, location.href);
};

// UBICACIÓN
function ubicacion(){
navigator.geolocation.getCurrentPosition(pos=>{
alert("Lat: "+pos.coords.latitude+" Lon: "+pos.coords.longitude);
});
}

// CALCULAR
function calcular(){

let P=parseFloat(monto.value);
let tasaVal=parseFloat(tasa.value);
let n=parseInt(plazo.value);
let prod=producto.value;

if(isNaN(P)||isNaN(tasaVal)||isNaN(n)){
alert("Completa los datos");
return;
}

let i=0;
if(prod==="semanal") i=(tasaVal/4)/100;
if(prod==="diario") i=(tasaVal/30)/100;
if(prod==="quincenal") i=(tasaVal/2)/100;
if(prod==="mensual") i=(tasaVal)/100;

let cuota=(P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML=`Cuota: S/ ${cuota.toFixed(2)}`;

window.ultimaSimulacion={
nombre:cliente.value,
ape:apellidos.value,
dni:dni.value,
cuota:cuota
};
}

// ENVIAR
function enviar(){

if(!window.ultimaSimulacion){
alert("Primero calcula");
return;
}

let d=window.ultimaSimulacion;

let msg=`Cliente: ${d.nombre} ${d.ape}
DNI: ${d.dni}
Cuota: S/ ${d.cuota.toFixed(2)}`;

location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

// FILTRO
function filtrar(){

let texto=dni.value.toLowerCase();

let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

let c=data.find(x=>
(x.dni+"").includes(texto)||
(x.nombre+"").toLowerCase().includes(texto)
);

if(!c){
alert("No encontrado");
return;
}

let msg=`Filtro:
${c.nombre} ${c.apellidos}
DNI: ${c.dni}`;

location.href="https://wa.me/?text="+encodeURIComponent(msg);
}

// PAGO
function registrarPago(){

let pagoVal=parseFloat(pago.value);

if(isNaN(pagoVal)){
alert("Monto inválido");
return;
}

estadoPago.innerHTML=`<div class="estado ok">Pago registrado: S/ ${pagoVal}</div>`;
}

// GUARDAR CLIENTE
function guardarCliente(){

let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

data.push({
nombre:c_nombre.value,
apellidos:c_apellidos.value,
dni:c_dni.value,
monto:c_monto.value,
producto:c_producto.value,
fecha:c_fecha.value
});

localStorage.setItem("cartera_"+asesor,JSON.stringify(data));

renderClientes();
}

// ESTADO AUTOMÁTICO
function calcularEstado(fecha){

let hoy=new Date();
let f=new Date(fecha);

let diff=(f-hoy)/(1000*60*60*24);

if(diff < 0){
return {texto:"En mora", clase:"mora"};
}else if(diff <= 2){
return {texto:"Por vencer", clase:"alerta"};
}else{
return {texto:"Al día", clase:"ok"};
}
}

// MOSTRAR CLIENTES
function renderClientes(){

let lista=document.getElementById("listaClientes");
let data=JSON.parse(localStorage.getItem("cartera_"+asesor)||"[]");

lista.innerHTML="";

data.forEach(c=>{

let estado=calcularEstado(c.fecha);

lista.innerHTML+=`
<div class="item">
<b>${c.nombre} ${c.apellidos}</b><br>
DNI: ${c.dni}<br>
Monto: S/ ${c.monto}<br>
Producto: ${c.producto}<br>
Pago: ${c.fecha}<br>

<span class="estado ${estado.clase}">
${estado.texto}
</span>

</div>`;
});
}

</script>

</body>
</html>
