<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Créditos - Credicompany</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a3a63;
    display: flex;
    justify-content: center;
}

.container {
    text-align: center;
    margin-top: 40px;
}

.logo {
    width: 140px;
    margin-bottom: 20px;
}

.card {
    background: #e5e5e5;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    background: #22c55e;
    color: white;
    border: none;
    cursor: pointer;
}

.resultado {
    margin-top: 15px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <div class="card">
        <h2>Simulador de Crédito</h2>

        <label>Tipo de crédito</label>
        <select id="frecuencia">
            <option value="1">Diario</option>
            <option value="7">Semanal</option>
            <option value="15">Quincenal</option>
            <option value="30">Mensual</option>
        </select>

        <input type="number" id="monto" placeholder="Monto (S/)">
        <input type="number" id="tasa" placeholder="Tasa (%)">
        <input type="number" id="plazo" placeholder="Número de cuotas">

        <button onclick="calcular()">Calcular</button>

        <div class="resultado" id="resultado"></div>
    </div>

</div>

<script>

function calcular() {

    let monto = parseFloat(document.getElementById("monto").value);
    let tasa = parseFloat(document.getElementById("tasa").value) / 100;
    let plazo = parseInt(document.getElementById("plazo").value);

    if (!monto || !tasa || !plazo) {
        alert("Completa todos los campos");
        return;
    }

    let cuota = (monto * tasa) / (1 - Math.pow(1 + tasa, -plazo));

    let saldo = monto;
    let html = "";

    for (let i = 1; i <= plazo; i++) {

        let interes = saldo * tasa;
        let capital = cuota - interes;
        saldo -= capital;

        html += `
        <p>
        <b>Cuota ${i}</b><br>
        Interés: S/ ${interes.toFixed(2)}<br>
        Capital: S/ ${capital.toFixed(2)}<br>
        Saldo: S/ ${saldo.toFixed(2)}
        </p>
        `;
    }

    document.getElementById("resultado").innerHTML = html;
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
