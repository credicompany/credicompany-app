<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credicompany</title>

<style>

body{
margin:0;
font-family:Arial;
background:#123B63;
color:white;
padding-bottom:120px;
}

.header{
text-align:center;
padding:20px;
}

.header img{
width:180px;
}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

.volver{
background:#0a2f5c;
color:white;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
cursor:pointer;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.btn-naranja{background:#ff9800;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:20px;
}

.box{
background:white;
color:#123B63;
padding:20px;
border-radius:15px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.fila{
display:flex;
gap:10px;
margin-top:10px;
}

.fila button{
width:50%;
}

.item{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
color:#333;
}

/* PAGOS */
.pagos-container{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.pago-box{
background:white;
padding:15px;
border-radius:12px;
width:100%;
max-width:320px;
text-align:center;
}

.pago-box img{
width:100%;
max-height:250px;
object-fit:contain;
border-radius:10px;
margin-bottom:10px;
}

.botones{
display:flex;
gap:10px;
}

.botones button{
width:50%;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<h2>Credicompany</h2>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="semanal">Semanal</option>
<option value="diario">Diario</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">Enviar</button>
<button class="btn-azul" onclick="filtrar()">Filtro</button>
</div>

<h3>Control de pagos</h3>
<input id="pago" placeholder="Monto pagado">
<button class="btn-naranja" onclick="registrarPago()">Registrar pago</button>
<div id="estadoPago"></div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<h3>Clientes</h3>

<input id="c_nombre" placeholder="Nombre">
<input id="c_apellidos" placeholder="Apellidos">
<input id="c_dni" placeholder="DNI">

<button class="btn-verde" onclick="guardarCliente()">Guardar</button>

<div id="listaClientes"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">

<div class="volver" onclick="volver()">← Volver</div>

<h3>💳 Medios de Pago</h3>

<div class="pagos-container">

<!-- BBVA -->
<div class="pago-box">
<h4>BBVA</h4>
<img src="https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg">
<div class="botones">
<button class="btn-azul" onclick="verImg('https://i.postimg.cc/BZyGX4PQ/Whats-App-Image-2026-04-02-at-12-36-51-PM-(1).jpg')">📸 Captura</button>
<button class="btn-verde" onclick="enviarPago('BBVA')">📲 Enviar</button>
</div>
</div>

<!-- BCP -->
<div class="pago-box">
<h4>BCP</h4>
<img src="https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg">
<div class="botones">
<button class="btn-azul" onclick="verImg('https://i.postimg.cc/DfDK8n4v/Whats-App-Image-2026-04-02-at-12-36-52-PM.jpg')">📸 Captura</button>
<button class="btn-verde" onclick="enviarPago('BCP')">📲 Enviar</button>
</div>
</div>

<!-- YAPE -->
<div class="pago-box">
<h4>YAPE</h4>
<img src="https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg">
<div class="botones">
<button class="btn-azul" onclick="verImg('https://i.postimg.cc/BZyGX4P0/Whats-App-Image-2026-04-02-at-12-36-52-PM-(1).jpg')">📸 Captura</button>
<button class="btn-verde" onclick="enviarPago('Yape')">📲 Enviar</button>
</div>
</div>

</div>

</div>

</div>

<script>

function login(){
if(usuario.value==="admin" && clave.value==="1234"){
loginDiv.style.display="none";
dashboard.style.display="block";
}else{
alert("Usuario incorrecto");
}
}

function mostrar(p){
dashboard.style.display="none";
app.style.display="block";

simulador.style.display="none";
clientes.style.display="none";
pagos.style.display="none";

document.getElementById(p).style.display="block";
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

function calcular(){
let m=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

let i=t/4;
let cuota=(m*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);
}

function enviar(){
window.open("https://wa.me/?text=Simulación Credicompany");
}

function filtrar(){
window.open("https://wa.me/?text=Filtro cliente");
}

function registrarPago(){
let m=parseFloat(pago.value);
if(isNaN(m)) return;
estadoPago.innerHTML="Pago: S/ "+m;
}

function guardarCliente(){
let lista=document.getElementById("listaClientes");
lista.innerHTML += `<div class="item">${c_nombre.value} ${c_apellidos.value}</div>`;
}

function verImg(src){
let w=window.open("");
w.document.write("<img src='"+src+"' style='width:100%'>");
}

function enviarPago(tipo){
let msg=`Credicompany

Pago vía ${tipo}

Enviar comprobante luego del pago.`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
