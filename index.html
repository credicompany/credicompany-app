<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;}
.header{display:flex;flex-direction:column;align-items:center;padding:20px;}
.card{background:#f2f2f2;color:#333;margin:15px;padding:20px;border-radius:15px;}
.volver{background:#0a2f5c;color:white;padding:12px;border-radius:10px;text-align:center;margin-bottom:10px;cursor:pointer;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;}
button{padding:12px;border:none;border-radius:10px;color:white;width:100%;margin-top:10px;}
.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px;}
.box{background:white;color:#123B63;padding:20px;border-radius:10px;text-align:center;cursor:pointer;}
.item{background:white;color:#333;padding:10px;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<div class="header">
<div>Credicompany</div>
<div>Asesor: <span id="nombreAsesor">-</span></div>
</div>

<!-- LOGIN -->
<div id="loginDiv" class="card">
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
<div class="grid">
<div class="box" onclick="mostrar('simulador')">💰 Simulación</div>
<div class="box" onclick="mostrar('clientes')">👥 Clientes</div>
<div class="box" onclick="mostrar('pagos')">💳 Pagos</div>
<div class="box" onclick="mostrar('admin')">⚙️ Usuarios</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIMULADOR -->
<div id="simulador" class="card">
<div class="volver" onclick="volver()">← Volver</div>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<button class="btn-azul" onclick="enviarSimulacion()">Enviar WhatsApp</button>
</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input id="c_nombre" placeholder="Nombre">
<input id="c_dni" placeholder="DNI">
<input id="c_monto" placeholder="Monto">

<button class="btn-verde" onclick="guardarCliente()">Guardar</button>

<input type="file" id="excelFile">
<button class="btn-azul" onclick="cargarExcel()">Cargar Excel</button>

<div id="listaClientes"></div>
</div>

<!-- PAGOS -->
<div id="pagos" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<button onclick="abrirQR('https://i.postimg.cc/BZyGX4PQ/Whats-App-Image.jpg')">Ver QR</button>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none">
<div class="volver" onclick="volver()">← Volver</div>

<input id="nuevoUser" placeholder="Usuario">
<input id="nuevoPass" placeholder="Clave">

<button class="btn-verde" onclick="crearUsuario()">Crear Usuario</button>

<div id="listaUsuarios"></div>
</div>

</div>

<script>

// 🔒 LOGIN
function login(){
let user=document.getElementById("usuario").value;
let pass=document.getElementById("clave").value;

if(user==="admin" && pass==="1234"){
localStorage.setItem("sesion",user);
iniciar(user);
return;
}

let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];
let ok=usuarios.find(u=>u.user===user && u.pass===pass);

if(ok){
localStorage.setItem("sesion",user);
iniciar(user);
}else alert("Credenciales incorrectas");
}

function iniciar(user){
nombreAsesor.innerText=user;
loginDiv.style.display="none";
dashboard.style.display="block";
}

// 🔄 AUTO LOGIN
window.onload=function(){
let s=localStorage.getItem("sesion");
if(s) iniciar(s);
}

// UI
function mostrar(id){
dashboard.style.display="none";
app.style.display="block";

["simulador","clientes","pagos","admin"].forEach(x=>{
document.getElementById(x).style.display="none";
});

document.getElementById(id).style.display="block";

if(id==="clientes") renderClientes();
if(id==="admin") renderUsuarios();
}

function volver(){
app.style.display="none";
dashboard.style.display="block";
}

// 💰 SIMULADOR
function calcular(){
let P=parseFloat(monto.value);
let t=parseFloat(tasa.value)/100;
let n=parseInt(plazo.value);

if(!P||!t||!n) return alert("Completa datos");

let cuota=(P*t)/(1-Math.pow(1+t,-n));

resultado.innerHTML="Cuota: S/ "+cuota.toFixed(2);

window.simData={P,cuota};
}

// 📲 WHATSAPP
function enviarSimulacion(){
if(!window.simData) return alert("Primero calcula");

let msg=`Simulación\nMonto: ${simData.P}\nCuota: ${simData.cuota}`;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// 👥 CLIENTES
function guardarCliente(){
let data=JSON.parse(localStorage.getItem("clientes")||"[]");

data.push({
nombre:c_nombre.value,
dni:c_dni.value,
monto:c_monto.value
});

localStorage.setItem("clientes",JSON.stringify(data));
renderClientes();
}

function renderClientes(){
let lista=document.getElementById("listaClientes");
let data=JSON.parse(localStorage.getItem("clientes")||"[]");

lista.innerHTML="";

data.forEach(c=>{
lista.innerHTML+=`
<div class="item">
<b>${c.nombre}</b><br>
DNI: ${c.dni}<br>
S/ ${c.monto}
</div>`;
});
}

// 📂 EXCEL
function cargarExcel(){
let file=document.getElementById("excelFile").files[0];
if(!file) return alert("Selecciona archivo");

let reader=new FileReader();

reader.onload=function(e){
let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:'array'});
let hoja=wb.Sheets[wb.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(hoja);

localStorage.setItem("clientes",JSON.stringify(json));
renderClientes();
};

reader.readAsArrayBuffer(file);
}

// ⚙️ USUARIOS
function crearUsuario(){
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

usuarios.push({
user:nuevoUser.value,
pass:nuevoPass.value
});

localStorage.setItem("usuarios",JSON.stringify(usuarios));
renderUsuarios();
}

function renderUsuarios(){
let lista=document.getElementById("listaUsuarios");
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||[];

lista.innerHTML="";
usuarios.forEach(u=>{
lista.innerHTML+=`<div class="item">${u.user}</div>`;
});
}

// 💳 QR
function abrirQR(link){
window.open(link);
}

</script>

</body>
</html>
