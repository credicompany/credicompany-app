<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credicompany</title>

<style>
body{margin:0;font-family:Arial;background:#123B63;color:white;}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.header img{width:180px;}

.asesor{
font-size:14px;
margin-top:5px;
opacity:0.8;
}

.card{
background:#f2f2f2;
color:#333;
margin:15px;
padding:20px;
border-radius:15px;
}

h3{text-align:center;}

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
padding:14px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
width:100%;
}

.btn-verde{background:#10c251;}
.btn-azul{background:#123B63;}

.fila{
display:flex;
gap:10px;
margin-top:10px;
}

.fila button{
width:50%;
}

.resultados{
margin-top:10px;
}

.resultado-item{
background:#fff;
padding:10px;
margin-top:5px;
border-radius:10px;
cursor:pointer;
}

.resultado-item:hover{
background:#eaeaea;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
<div class="asesor">Asesor: <span id="nombreAsesor">-</span></div>
</div>

<div id="loginDiv" class="card">
<h3>Ingreso Asesor</h3>
<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">
<button class="btn-verde" onclick="login()">Ingresar</button>
</div>

<div id="app" style="display:none">

<div class="card">

<h3>Simulador</h3>

<input id="cliente" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="dni" placeholder="DNI">

<select id="producto">
<option value="diario">Diario</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
<option value="mensual">Mensual</option>
</select>

<input id="monto" placeholder="Monto">
<input id="tasa" placeholder="Tasa (%)">
<input id="plazo" placeholder="Número de cuotas">

<button class="btn-verde" onclick="calcular()">Calcular</button>
<button onclick="limpiar()" style="background:#999;margin-top:5px;">🔄 Nuevo</button>

<div id="resultado"></div>
<div id="cronograma"></div>

<div class="fila">
<button class="btn-verde" onclick="enviar()">📲 Enviar</button>
<button class="btn-azul" onclick="filtrar()">🔍 Filtrar</button>
</div>

<!-- RESULTADOS FILTRO -->
<div id="listaResultados" class="resultados"></div>

</div>

</div>

<script>

let ultimaSimulacion = {};
let asesor = "";

// LOGIN
function login(){
if(usuario.value=="admin" && clave.value=="1234"){
asesor = usuario.value;
nombreAsesor.innerText = asesor;
loginDiv.style.display="none";
app.style.display="block";
}else{
alert("Datos incorrectos");
}
}

// LIMPIAR
function limpiar(){
cliente.value="";
apellidos.value="";
dni.value="";
monto.value="";
tasa.value="";
plazo.value="";
resultado.innerHTML="";
cronograma.innerHTML="";
listaResultados.innerHTML="";
}

// CALCULAR
function calcular(){

let nombre = cliente.value;
let ape = apellidos.value;
let doc = dni.value;

let P = parseFloat(monto.value);
let tasaInput = parseFloat(tasa.value);
let n = parseInt(plazo.value);
let producto = document.getElementById("producto").value;

if(!nombre || !ape || !doc || !P || !tasaInput || !n){
alert("Completa todos los datos");
return;
}

let i;

if(producto=="diario") i = (tasaInput/30)/100;
if(producto=="semanal") i = (tasaInput/4)/100;
if(producto=="quincenal") i = (tasaInput/2)/100;
if(producto=="mensual") i = (tasaInput)/100;

let cuota = (P*i)/(1-Math.pow(1+i,-n));

resultado.innerHTML = `
Producto: ${producto.toUpperCase()}<br>
Cuota: S/ ${cuota.toFixed(2)}
`;

ultimaSimulacion = {P, cuota, n, producto};

// GUARDAR
let data = JSON.parse(localStorage.getItem("clientes") || "[]");

data.push({
nombre,
apellidos:ape,
dni:doc,
monto:P,
cuota:cuota.toFixed(2)
});

localStorage.setItem("clientes", JSON.stringify(data));

}

// FILTRO AVANZADO
function filtrar(){

let texto = dni.value.toLowerCase();

if(!texto){
alert("Ingrese dato a buscar");
return;
}

let data = JSON.parse(localStorage.getItem("clientes") || "[]");

let resultados = data.filter(c =>
c.dni.includes(texto) ||
c.nombre.toLowerCase().includes(texto) ||
c.apellidos.toLowerCase().includes(texto)
);

let html = "";

if(resultados.length==0){
html = "No encontrado";
}

resultados.forEach(c=>{
html += `
<div class="resultado-item" onclick="seleccionarCliente('${c.nombre}','${c.apellidos}','${c.dni}','${c.monto}')">
<b>${c.nombre} ${c.apellidos}</b><br>
DNI: ${c.dni}
</div>
`;
});

listaResultados.innerHTML = html;

}

// SELECCIONAR
function seleccionarCliente(n,a,d,m){
cliente.value = n;
apellidos.value = a;
dni.value = d;
monto.value = m;
listaResultados.innerHTML="";
}

// WHATSAPP
function enviar(){

if(!ultimaSimulacion.P){
alert("Primero calcula");
return;
}

let msg = `📌 Simulación

💰 Monto: S/ ${ultimaSimulacion.P}
💵 Cuota: S/ ${ultimaSimulacion.cuota.toFixed(2)}
📅 Plazo: ${ultimaSimulacion.n}
📊 Producto: ${ultimaSimulacion.producto}`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
